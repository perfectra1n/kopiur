# Example 11 — Credential projection (ADR §3.2 / §4.11)
#
# A shared ClusterRepository keeps its credential Secret in the operator namespace,
# but a mover Job runs in the WORKLOAD namespace and loads creds via namespace-local
# `envFrom`. By default you must place a copy of that Secret in each workload
# namespace yourself (see Example 02 + the Movers guide).
#
# `spec.credentialProjection.enabled: true` opts out of that chore: before each
# mover run, the operator copies the repository's credential Secret(s) into the
# Job's namespace, owned by the consuming Backup/Restore/Maintenance (so it is
# garbage-collected with that CR) and refreshed from source every run.
#
# REQUIRES:
#   * installScope=cluster (ClusterRepository is a cluster-scoped kind).
#   * Helm `secretProjection.enabled: true` (default) — grants the operator the
#     cluster-wide `secrets` create/patch RBAC projection needs. With it off, a
#     projection-enabled repo surfaces an actionable 403 instead.
#
# Verified against crates/api: `credentialProjection` is an externally-untagged
# sub-object `{ enabled: bool }` on RepositorySpec / ClusterRepositorySpec.
---
# The shared repository's credentials — only ever placed here, in the operator
# namespace. Projection copies (never moves) them into workload namespaces.
apiVersion: v1
kind: Secret
metadata:
  name: kopia-shared-creds
  namespace: kopiur-system
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  KOPIA_PASSWORD: "choose-something-long-and-random"
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: shared-projected
spec:
  backend:
    s3:
      bucket: org-kopia-repo
      prefix: ""
      endpoint: s3.us-east-1.amazonaws.com
      region: us-east-1
      auth:
        secretRef:
          name: kopia-shared-creds
          namespace: kopiur-system # source ns (explicit ns required for cluster scope)
  encryption:
    passwordSecretRef:
      name: kopia-shared-creds
      namespace: kopiur-system # source ns the operator projects FROM
      key: KOPIA_PASSWORD
  allowedNamespaces:
    all: true
  # THE OPT-IN. Off by default; when true the operator projects the credential
  # Secret(s) above into each mover Job's namespace so you don't have to.
  credentialProjection:
    enabled: true
---
# A workload namespace that has NEVER been given a copy of kopia-shared-creds.
# With projection on, the backup still succeeds: the operator projects a
# kopiur-managed `<backup-run>-creds-0` Secret into `media` before the mover runs.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: BackupConfig
metadata:
  name: jellyfin-config
  namespace: media
spec:
  repository:
    kind: ClusterRepository
    name: shared-projected
  sources:
    - pvc:
        name: jellyfin-config
  retention:
    keepDaily: 7
