# Example 08 — Maintenance (ADR-0001 §3.7, ADR-0003 §4.5)
#
# `kopia maintenance` is a first-class concern with its own CRD and an explicit
# ownership lease (G11). At most one Maintenance owns a repository. A default is
# created implicitly on first reference to a Repository; declare your own to tune
# the schedules or ownership.
#
# `schedule.quick` / `schedule.full` are CronSpec { cron, jitter }.
# `ownership.takeoverPolicy` is a closed enum: Never (default, safest) |
# PromptCondition | Force.
# Storage actually reclaimed is surfaced ONLY here, in status.{quick,full}
# .lastContentReclaimedBytes (ADR §3.7/§4.5).
---
apiVersion: kopia.io/v1alpha1
kind: Maintenance
metadata:
  name: nas-primary-maintenance
  namespace: billing
spec:
  repository:
    kind: Repository
    name: nas-primary
  schedule:
    quick:
      cron: "0 */6 * * *"
      jitter: 30m
    full:
      cron: "0 3 * * 0"
      jitter: 1h
    timezone: UTC
  ownership:
    owner: "kopia-operator/nas-primary"
    takeoverPolicy: PromptCondition
  mover:
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
  failurePolicy:
    backoffLimit: 1
    activeDeadlineSeconds: 14400
