# Example 09 — Mover UID/GID & permissions (ADR-0003 §4.11/§G16)
#
# The mover Job is what reads your PVC. It must run as a UID/GID that can READ the
# data. By default movers run unprivileged as the image user (UID 65532) with a
# hardened securityContext (runAsNonRoot, drop ALL caps, seccomp RuntimeDefault).
# Override per-recipe via `spec.mover.securityContext` to match the UID/GID that
# owns your data. See the Permissions guide for how to find those numbers.
#
# Field shapes verified against crates/api: `spec.mover.securityContext` is a
# standard core/v1 SecurityContext (container-level).
---
apiVersion: v1
kind: Secret
metadata:
  name: app-repo-creds
  namespace: app
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  KOPIA_PASSWORD: "choose-something-long-and-random"
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Repository
metadata:
  name: app-primary
  namespace: app
spec:
  backend:
    s3:
      bucket: my-backups
      region: us-east-1
      auth:
        secretRef:
          name: app-repo-creds
  encryption:
    passwordSecretRef:
      name: app-repo-creds
      key: KOPIA_PASSWORD
  create:
    enabled: true
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: BackupConfig
metadata:
  name: app-data
  namespace: app
spec:
  repository:
    name: app-primary
  sources:
    - pvc:
        name: app-data
  retention:
    keepDaily: 14
    keepWeekly: 4
  # ── The permissions knob ──────────────────────────────────────────────────
  # Run the mover as the SAME UID/GID that owns the files in the PVC, so it can
  # read them. Here the app writes its data as 1000:1000.
  mover:
    securityContext:
      runAsUser: 1000 # match the UID that owns the data
      runAsGroup: 1000 # match the GID that owns the data
      runAsNonRoot: true # keep the unprivileged guarantee
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
    # ── Root mover (LAST RESORT) ──────────────────────────────────────────────
    # If the data is owned by assorted UIDs you cannot match (e.g. lost+found, or
    # an app that writes as root), a root mover reads everything. This is ELEVATED:
    # the workload namespace must opt in first, or the Backup is refused:
    #   kubectl annotate namespace app kopiur.home-operations.com/privileged-movers=true
    # securityContext:
    #   runAsUser: 0           # root — reads any file
    #   runAsNonRoot: false
    # privilegedMode: true     # also preserves UID/GID ownership on RESTORE
