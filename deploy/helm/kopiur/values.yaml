# Default values for the kopiur chart.
# This is a YAML-formatted file. Every key is documented inline.
# See deploy/helm/kopiur/README.md for install modes and worked examples.

# -- Override the chart name used in resource names (defaults to .Chart.Name = "kopiur").
nameOverride: ""
# -- Override the full release-qualified name (defaults to "<release>-kopiur").
fullnameOverride: ""

# =============================================================================
# Images
# =============================================================================
# Three images ship with kopiur:
#   * controller — the operator (reconcilers); exposes /metrics.
#   * webhook    — the axum admission server (validating + mutating).
#   * mover      — the per-Job image (one Job per Backup/Restore/Maintenance run).
#
# Per ADR §G15 the mover image MUST be reproducibly pinned: prefer `digest`
# over a floating tag in production so a re-pulled `:latest` can never change
# what runs in a data-protection Job. When `digest` is set it wins over `tag`.
image:
  # -- Container registry shared by all three images unless overridden per-image.
  registry: ghcr.io
  # -- Default image pull policy for controller and webhook.
  pullPolicy: IfNotPresent
  # Controller (operator) image.
  controller:
    repository: home-operations/kopiur-controller
    # -- Defaults to .Chart.AppVersion when empty.
    tag: ""
    # -- Pin by digest (e.g. "sha256:..."); takes precedence over tag.
    digest: ""
  # Admission webhook image.
  webhook:
    repository: home-operations/kopiur-webhook
    tag: ""
    digest: ""
  # Mover (per-Job) image. The controller reads this reference and stamps it
  # into every Job it creates. Digest-pinned recommended (ADR §G15).
  mover:
    repository: home-operations/kopiur-mover
    tag: ""
    # -- STRONGLY RECOMMENDED in production. Digest pin for the mover Job image.
    digest: ""
    # -- Pull policy used on the mover Job pods.
    pullPolicy: IfNotPresent

# -- Image pull secrets applied to controller/webhook pods and mover Jobs.
imagePullSecrets: []
#  - name: my-registry-creds

# =============================================================================
# Install scope & CRDs
# =============================================================================

# -- Install the 7 kopiur.home-operations.com CRDs as part of this release.
# When true the CRDs are rendered under templates/ (guarded by this flag) so
# `helm uninstall` removes them and `installCRDs: false` actually omits them.
# Trade-off: templated CRDs are subject to Helm's normal apply ordering and
# (unlike the special `crds/` directory) are NOT skipped on `helm upgrade`.
# That is the behavior we want for an alpha API. If you manage CRDs out of band
# (GitOps applies deploy/crds/*.yaml directly), set this to false.
installCRDs: true

# -- "namespaced" (default) or "cluster".
#   namespaced — RBAC is a namespace-scoped Role/RoleBinding. The operator
#     manages kopiur.home-operations.com resources only in its own namespace. ClusterRepository
#     is NOT reconciled (it is a cluster-scoped kind and out of a Role's reach).
#   cluster    — RBAC is a ClusterRole/ClusterRoleBinding. The operator manages
#     kopiur.home-operations.com resources cluster-wide AND reconciles ClusterRepository.
# Per ADR §4.11 namespaced is the safer default; cluster scope is an explicit
# opt-in for platform teams running a shared backup tier.
installScope: namespaced

# =============================================================================
# Credential projection
# =============================================================================
# Per-repository `spec.credentialProjection.enabled` lets the operator copy a
# repository's credential Secret(s) into each mover Job's namespace, so users with
# many namespaces don't have to pre-create the Secret everywhere (the chief win is
# a shared ClusterRepository whose Secret is pinned to one namespace). That
# requires the operator to hold cluster-wide `secrets` create/patch.
secretProjection:
  # -- Grant the operator `secrets` create+patch in its RBAC so per-repository
  # `spec.credentialProjection` works. Default off — projection is itself opt-in
  # per-repository (`spec.credentialProjection.enabled` defaults to false), so the
  # chart does not hand out the broader RBAC until you actually use the feature.
  # SECURITY TRADE-OFF: enabling this is a broader blast radius — `create` cannot
  # be scoped to a Secret name, so the operator can write a Secret in any namespace
  # it manages. Leave false to keep `secrets` RBAC read-only (then any
  # projection-enabled repository surfaces an actionable 403 and you manage
  # credential Secrets yourself); set true once you opt a repository into projection.
  enabled: false

# =============================================================================
# Extra RBAC
# =============================================================================
rbac:
  # -- Render an OPT-IN ClusterRole "<release>-browse" carrying exactly what a
  # human needs to run the `kubectl kopiur ls/cat/download/browse` data-plane:
  # read snapshots/repositories, create/delete the session Job + ConfigMap, and
  # exec into the session pod. It deliberately grants NO access to Secrets —
  # the session pod loads the repository credentials itself, so a browsing user
  # never reads them (`--local` is the exception and additionally needs `get
  # secrets`, granted separately). The chart only renders the ClusterRole; bind
  # it to your users/groups with your own (Cluster)RoleBinding.
  browseRole: false

# =============================================================================
# ServiceAccount
# =============================================================================
serviceAccount:
  # -- Create the ServiceAccount. Disable to bring your own.
  create: true
  # -- Name to use; defaults to the chart fullname when empty.
  name: ""
  # -- Extra annotations (e.g. IRSA / Workload Identity role bindings).
  annotations: {}

# =============================================================================
# Controller deployment
# =============================================================================
controller:
  # -- Number of controller replicas. >1 enables HA via leader election;
  # only the elected leader reconciles, so deterministic jitter (ADR §4.1)
  # keeps schedules identical across replicas and across failover.
  replicaCount: 1
  # -- Enable leader election. Required when replicaCount > 1; harmless at 1.
  leaderElection:
    enabled: true
  # -- DEPRECATED: use the top-level `logging.level` instead. Kept as a fallback
  # for existing values files — `logging.level` wins when both are set. Applies to
  # the controller and webhook (RUST_LOG style: error|warn|info|debug|trace).
  logLevel: info
  # -- Extra CLI args appended to the controller container.
  extraArgs: []
  # -- Extra environment variables for the controller container.
  extraEnv: []
  # -- Tokio worker threads for the controller runtime. The controller is I/O-bound,
  # so a small pool is ample; the runtime default sizes to the host core count
  # (ignoring the cgroup CPU quota), over-allocating worker threads — each a stack
  # plus a malloc arena — on large nodes, inflating RSS for no throughput gain.
  # Raise only for a reconcile-heavy deployment.
  workerThreads: 2
  # -- Opt-in: use the Kubernetes WatchList streaming-list API for the controller's
  # cluster-wide watches, lowering peak memory during the initial resync by streaming
  # pages instead of buffering them. Requires apiserver support (WatchList: beta in
  # 1.32, GA in 1.34); leave off on older clusters.
  streamingLists: false
  # -- Extra volumes on the controller pod. Use this to make a filesystem-backend
  # repository reachable in-process (hostPath/NFS/PVC) so the controller can run
  # short idempotent kopia ops (ADR §5.4). The e2e harness uses a hostPath here.
  extraVolumes: []
  # -- Extra volume mounts on the controller container (pairs with extraVolumes).
  extraVolumeMounts: []
  # -- Resource requests/limits for the controller pod.
  # No CPU limit (CPU throttling on an operator only adds reconcile latency; the
  # request reserves a fair share). The memory limit must cover the *burst* on
  # startup/restart, not just steady state (~120Mi): on (re)start the controller
  # reconciles every existing resource at once, spawning concurrent in-process
  # `kopia` subprocesses (whose RSS counts against this container's cgroup) to
  # list/connect a repository that may hold many snapshots. With the
  # OpenTelemetry/OTLP stack linked in, 256Mi was too tight — the burst OOMKilled
  # the controller, which then crash-looped (OOM -> restart -> re-reconcile burst
  # -> OOM). 1Gi gives ample headroom. See crates/e2e/tests/lifecycle.rs.
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 1Gi
  # -- Scheduling controls.
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # -- Pod-level priority class.
  priorityClassName: ""
  # -- Extra pod labels / annotations.
  podLabels: {}
  podAnnotations: {}
  # -- Liveness/readiness HTTP probe port on the controller (serves /healthz, /readyz, /metrics).
  probePort: 8080

# =============================================================================
# Admission webhook
# =============================================================================
# Implemented as a SEPARATE Deployment + Service (cleaner than folding it into
# the controller) per ADR §5.3. The Service maps 443 -> the container's 8443.
webhook:
  # -- Deploy the webhook (Deployment + Service + Validating/Mutating configs).
  # When false, validation falls back to the controller's defensive checks only.
  enabled: true
  replicaCount: 1
  # -- failurePolicy for both webhook configurations: Fail (fail-closed,
  # recommended for a backup operator — ADR §7.2) or Ignore.
  failurePolicy: Fail
  # -- timeoutSeconds for admission requests (1..30).
  timeoutSeconds: 10
  # -- Address the webhook server binds to (env KOPIUR_WEBHOOK_ADDR).
  listenAddr: "0.0.0.0:8443"
  # -- Port the webhook container listens on (must match listenAddr above).
  containerPort: 8443
  # The webhook serves /metrics on its TLS port (kopiur_webhook_admission_total).
  serviceMonitor:
    # -- Create a ServiceMonitor scraping the webhook's /metrics over HTTPS.
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    # -- The webhook serves a self-signed cert, so skip verification by default.
    insecureSkipVerify: true
  # No CPU limit (see controller.resources). The webhook links the same
  # OpenTelemetry/OTLP stack but does no kopia work, so it stays light; the
  # generous memory limit is pure headroom.
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  priorityClassName: ""
  podLabels: {}
  podAnnotations: {}
  # TLS for the webhook server. The webhook ALWAYS serves TLS (k8s requires
  # HTTPS for admission). How the serving cert is provisioned is chosen by
  # tls.mode below.
  tls:
    # -- How the webhook serving certificate is provisioned and trusted. One of:
    #   self         — the operator mints its own CA + serving cert, writes the
    #                  Secret, and injects caBundle into the webhook
    #                  configurations itself. No cert-manager, no manual steps,
    #                  and the leaf is auto-rotated before expiry. (default)
    #   cert-manager — cert-manager issues the serving cert and its ca-injector
    #                  populates caBundle (requires cert-manager installed;
    #                  configure certManager.issuerRef below).
    #   manual       — you pre-create the tls.secretName Secret (kubernetes.io/tls)
    #                  and set webhook.caBundle (base64 PEM) yourself.
    mode: self
    # -- Name of the Secret holding tls.crt / tls.key (and, in self mode, ca.crt).
    # In self mode the operator creates and owns it; in cert-manager mode
    # cert-manager writes it; in manual mode YOU create it before install.
    secretName: kopiur-webhook-tls
  certManager:
    # -- Use an existing Issuer/ClusterIssuer instead of the self-signed Issuer
    # this chart creates. Only used when tls.mode is cert-manager. Leave name
    # empty to use the chart-managed self-signed Issuer.
    issuerRef:
      name: ""
      kind: Issuer # Issuer | ClusterIssuer
  # -- Base64-encoded PEM CA bundle injected into the webhook configurations.
  # Only used when tls.mode is manual; required there so the API server trusts
  # the serving cert. Ignored in self and cert-manager modes (caBundle is
  # populated by the operator or cert-manager's ca-injector respectively).
  caBundle: ""

# =============================================================================
# Metrics & observability
# =============================================================================
metrics:
  # -- Expose a Service for the controller's /metrics endpoint.
  enabled: true
  # -- Service port for /metrics.
  port: 8080
  serviceMonitor:
    # -- Create a Prometheus-Operator ServiceMonitor. Requires the CRD to exist.
    enabled: false
    # -- Scrape interval.
    interval: 30s
    # -- Scrape timeout.
    scrapeTimeout: 10s
    # -- Extra labels (e.g. to match your Prometheus serviceMonitorSelector).
    labels: {}
    # -- Relabelings / metricRelabelings passed through verbatim.
    relabelings: []
    metricRelabelings: []
  prometheusRule:
    # -- Create a Prometheus-Operator PrometheusRule with kopiur alerts.
    enabled: false
    # -- Extra labels (e.g. to match your Prometheus ruleSelector).
    labels: {}
    # -- Age (seconds) after which a SnapshotPolicy's last success is "stale".
    backupStaleAfterSeconds: 172800 # 48h

# -- Grafana dashboard for the kopiur fleet. The same JSON lives in
# deploy/dashboards/kopiur.json (the single source of truth, copied into the
# chart by `cargo xtask gen-all`) for manual import. By default it ships as a
# ConfigMap labeled for the Grafana sidecar to auto-discover; flip
# grafanaOperator.enabled to render a grafana-operator GrafanaDashboard CR from
# the very same JSON instead.
grafanaDashboard:
  # -- Create the dashboard (a sidecar ConfigMap by default).
  enabled: false
  # -- Label the Grafana sidecar watches for (key: value). Adjust to your stack.
  label: grafana_dashboard
  labelValue: "1"
  # -- Annotation setting the Grafana folder for the sidecar ConfigMap (optional).
  folderAnnotation: ""
  folder: ""
  # -- Namespace for the dashboard object; defaults to the release namespace.
  namespace: ""
  # -- Extra annotations added to the dashboard object (ConfigMap or CR).
  annotations: {}
  # -- Extra labels added to the dashboard object (ConfigMap or CR).
  labels: {}
  grafanaOperator:
    # -- Render a grafana-operator GrafanaDashboard CR instead of the sidecar ConfigMap.
    enabled: false
    # -- Allow a Grafana in any namespace to import this GrafanaDashboard.
    allowCrossNamespaceImport: true
    # -- Folder to create the dashboard in (Grafana folder name).
    folder: ""
    # -- How often grafana-operator re-checks the dashboard for updates.
    resyncPeriod: "10m"
    # -- spec.instanceSelector.matchLabels — selects which Grafana instance(s) load this dashboard.
    matchLabels: {}

# =============================================================================
# OpenTelemetry (OTLP) — traces, logs, and a metrics push, off by default
# =============================================================================
# When enabled, the controller, webhook, and mover Jobs export OTLP to the
# configured collector (the controller passes the same OTEL_* env to movers).
# Metrics are ALSO always available via the Prometheus /metrics pull endpoint;
# OTLP just adds a push path plus traces and logs. Env var names match
# crates/telemetry/src/env.rs.
observability:
  otlp:
    # -- Enable OTLP export (sets OTEL_EXPORTER_OTLP_ENDPOINT on all components).
    enabled: false
    # -- Collector gRPC endpoint. Required when enabled. Only gRPC is compiled in.
    endpoint: "http://otel-collector.observability.svc:4317"
    # -- OTEL_EXPORTER_OTLP_PROTOCOL (only "grpc" is supported by this build).
    protocol: "grpc"
    # -- OTEL_EXPORTER_OTLP_HEADERS, e.g. "authorization=Bearer xyz". Empty to omit.
    headers: ""
    # -- Fail-fast on telemetry misconfiguration instead of degrading to fmt+pull.
    strict: false
    # -- Extra raw env (e.g. OTEL_TRACES_SAMPLER) added to every component.
    extraEnv: []

# =============================================================================
# Logging (stdout / `kubectl logs`)
# =============================================================================
# Controls the fmt logging that every component writes to stdout. The controller
# passes RUST_LOG + KOPIUR_LOG_FORMAT through to mover Jobs, so a mover honors the
# same level and format. Env var names match crates/telemetry/src/env.rs.
logging:
  # -- Log level / filter directive (RUST_LOG style: error|warn|info|debug|trace;
  # per-target works too, e.g. "info,kopia=debug" to see kopia's own progress in
  # mover logs). When empty, falls back to the deprecated `controller.logLevel`.
  level: ""
  # -- Console format: "text" (human-readable, default) or "json" (one structured
  # object per line for Loki/ELK/Datadog). Unknown values degrade to text.
  format: text

# =============================================================================
# Pod security (shared defaults; per-component sections may override)
# =============================================================================
# Non-root uid 65534 (nobody) default, per ADR §4.9/§4.11 — distroless:nonroot.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
