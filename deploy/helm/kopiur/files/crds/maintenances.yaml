                    description: Count of back-to-back failed runs of this kind; resets on success.
                    format: int64
                    nullable: true
                    type: integer
                  lastContentReclaimedBytes:
                    description: The ONLY place storage reclamation is surfaced (ADR §3.7/§4.5).
                    format: int64
                    nullable: true
                    type: integer
                  lastRunAt:
                    description: RFC3339 instant of the most recent run of this kind.
                    nullable: true
                    type: string
                  nextScheduledAt:
