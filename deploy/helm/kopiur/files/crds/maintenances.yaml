                  requestedAt:
                    description: The `run-requested` annotation value this status reflects (RFC3339).
                    nullable: true
                    type: string
                type: object
              observedGeneration:
                description: The `metadata.generation` this status reflects, for staleness detection.
                format: int64
                nullable: true
                type: integer
              ownership:
                description: Current lease holder, if the lease has been claimed. ADR §3.7.
                nullable: true
                properties:
                  claimedAt:
                    description: RFC3339 instant the lease was claimed.
                    nullable: true
                    type: string
                  owner:
                    description: The current lease holder's identity (matches `Ownership.owner`).
                    nullable: true
                    type: string
                type: object
              quick:
                description: Last/next-run state for the quick maintenance schedule. ADR §3.7.
                nullable: true
                properties:
