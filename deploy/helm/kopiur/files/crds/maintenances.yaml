                      is set a built-in default applies ([`DEFAULT_JOB_TTL_SECONDS`]). ADR-0005 §12.
                    format: int64
                    nullable: true
                    type: integer
                type: object
              ownership:
                description: |-
                  Ownership-lease configuration; at most one `Maintenance` may own a
                  repository at a time. ADR §3.7.
                properties:
                  owner:
                    description: |-
                      Stable lease holder identity (e.g. `kopia-operator/nas-primary`). Two
                      `Maintenance` CRs claiming the same repository compare this. ADR §3.7.
                    type: string
                  takeoverPolicy:
                    default: Never
                    description: What to do if the lease is already held by a different `owner`. ADR §3.7.
                    enum:
                    - Never
                    - PromptCondition
                    - Force
                    type: string
                required:
                - owner
                type: object
              repository:
                description: Discriminated reference to a `Repository` or `ClusterRepository`. ADR §3.2.
                properties:
                  kind:
                    default: Repository
                    description: Which repository CRD this points at; defaults to [`RepositoryKind::Repository`].
                    enum:
                    - Repository
                    - ClusterRepository
                    type: string
                  name:
                    description: Name of the referenced `Repository`/`ClusterRepository`.
                    type: string
                  namespace:
                    description: Cross-namespace `Repository` reference; ignored/forbidden for `ClusterRepository`.
                    nullable: true
                    type: string
                required:
                - name
                type: object
              schedule:
                description: |-
                  Quick + full cron schedules (with a shared timezone) for `kopia
                  maintenance run`. ADR §3.7.
                properties:
                  full:
                    description: Cron + jitter for `kopia maintenance run --full` (content reclamation).
                    properties:
                      cron:
                        description: |-
                          The cron expression, parsed by `croner`. May contain an `H` placeholder for
                          deterministic per-schedule jitter (ADR §3.7).
                        type: string
                      jitter:
                        description: |-
                          Optional deterministic jitter window as a Go-style duration string (e.g.
                          `30m`), derived from `(scheduleUID, slot)` so it is stable across restarts.
                        nullable: true
                        type: string
                    required:
                    - cron
                    type: object
                  quick:
                    description: Cron + jitter for `kopia maintenance run` (quick = cheap index/log work).
                    properties:
                      cron:
                        description: |-
                          The cron expression, parsed by `croner`. May contain an `H` placeholder for
                          deterministic per-schedule jitter (ADR §3.7).
                        type: string
                      jitter:
                        description: |-
                          Optional deterministic jitter window as a Go-style duration string (e.g.
                          `30m`), derived from `(scheduleUID, slot)` so it is stable across restarts.
                        nullable: true
                        type: string
                    required:
                    - cron
                    type: object
                  timezone:
                    description: IANA timezone both crons are evaluated in; absent means controller default.
                    nullable: true
                    type: string
                required:
                - full
                - quick
                type: object
            required:
            - ownership
            - repository
            - schedule
            type: object
          status:
            description: 'Observed maintenance state: lease holder plus per-kind run results. ADR §3.7.'
            nullable: true
            properties:
              conditions:
                description: Standard Kubernetes conditions surfacing maintenance health. ADR §5.
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: message is a human readable message indicating details about the transition. This may be an empty string.
                      type: string
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              full:
                description: Last/next-run state for the full maintenance schedule. ADR §3.7.
                nullable: true
                properties:
                  consecutiveFailures:
                    description: Count of back-to-back failed runs of this kind; resets on success.
                    format: int64
                    nullable: true
                    type: integer
                  lastContentReclaimedBytes:
