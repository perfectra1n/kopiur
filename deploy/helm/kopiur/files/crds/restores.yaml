                            description: The UserName in Windows to run the entrypoint of the container process. Defaults to the user specified in image metadata if unspecified. May also be set in PodSecurityContext. If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
                            type: string
                        type: object
                    type: object
                  ttlSecondsAfterFinished:
                    description: |-
                      Per-recipe override of `moverDefaults.ttlSecondsAfterFinished` — the
                      `Job.spec.ttlSecondsAfterFinished` for this recipe's mover Jobs so finished
                      backup/restore Jobs self-GC. Recipe wins over the repo default; when neither
                      is set a built-in default applies ([`DEFAULT_JOB_TTL_SECONDS`]). ADR-0005 §12.
                    format: int64
                    nullable: true
                    type: integer
                type: object
              options:
                description: kopia restore behavior (file deletion, permission/atomicity handling). ADR §4.6.
                nullable: true
                properties:
                  enableFileDeletion:
                    description: |-
                      Delete files in the target that are not present in the snapshot (make the
                      target an exact mirror). Off by default — additive restore is the safe default.
                    type: boolean
                  ignorePermissionErrors:
                    description: Default true; surfaces a condition if any errors occurred. ADR §4.6.
                    nullable: true
                    type: boolean
                  writeFilesAtomically:
                    description: Default true. ADR §4.6.
                    nullable: true
                    type: boolean
                type: object
              policy:
                description: Missing-snapshot handling and wait timeout. ADR §4.6 (G7).
                nullable: true
                properties:
                  onMissingSnapshot:
                    description: |-
                      What to do when the resolved source matches no snapshot. Closed enum. ADR §4.6 (G7).

                      ```
                      use kopiur_api::restore::OnMissingSnapshot;

                      // Fail-closed is the default so an explicit restore can't silently no-op.
                      assert_eq!(OnMissingSnapshot::default(), OnMissingSnapshot::Fail);
                      assert_eq!(serde_json::to_value(OnMissingSnapshot::Continue).unwrap(), "Continue");
                      ```
                    enum:
                    - Fail
                    - Continue
                    nullable: true
                    type: string
                  waitTimeout:
                    description: |-
                      How long to wait for the source snapshot to appear before giving up
                      (Go-style duration string, e.g. `5m`).
                    nullable: true
                    type: string
                type: object
              repository:
                description: Derived from `source` when omitted; REQUIRED only with `source.identity`. ADR §3.6/§4.6.
                nullable: true
                properties:
                  kind:
                    default: Repository
                    description: Which repository CRD this points at; defaults to [`RepositoryKind::Repository`].
                    enum:
                    - Repository
                    - ClusterRepository
                    type: string
                  name:
                    description: Name of the referenced `Repository`/`ClusterRepository`.
                    type: string
                  namespace:
                    description: Cross-namespace `Repository` reference; ignored/forbidden for `ClusterRepository`.
                    nullable: true
                    type: string
                required:
                - name
                type: object
              source:
                description: Exactly one source mode; webhook-enforced. ADR §3.6.
                oneOf:
                - required:
                  - snapshotRef
                - required:
                  - fromPolicy
                - required:
                  - identity
                properties:
                  fromPolicy:
                    description: |-
                      A `SnapshotPolicy` CR — resolves via identity even with no `Snapshot` CR present
                      (deploy-or-restore). Default `onMissingSnapshot: Continue`. ADR §4.6.
                    properties:
                      asOf:
                        description: Restore the newest snapshot at or before this RFC3339 timestamp (point-in-time).
                        nullable: true
                        type: string
                      name:
                        description: Name of the `SnapshotPolicy` whose identity selects the snapshot.
                        type: string
                      namespace:
                        description: Namespace of the `SnapshotPolicy`; absent = the `Restore`'s own namespace.
                        nullable: true
                        type: string
                      offset:
                        default: 0
                        description: |-
                          0 = latest, 1 = previous, ... ADR §3.6.

                          Carries a real OpenAPI `default: 0` (ADR-0005 §1): unconditional, so it
                          materializes into the stored object / `kubectl explain` and GitOps stops
                          diff-thrashing. A bare `i64` (not `Option`) so the default is never dropped.
                        format: int64
                        type: integer
                    required:
                    - name
                    type: object
                  identity:
                    description: A raw kopia identity (foreign writers / aged-out catalog). Requires `spec.repository`.
                    properties:
                      asOf:
                        description: Restore the newest snapshot at or before this RFC3339 timestamp (point-in-time).
                        nullable: true
                        type: string
                      hostname:
                        description: The kopia `hostname` to match.
                        type: string
                      offset:
                        description: 0 = latest, 1 = previous, ... mutually exclusive with `snapshotID`/`asOf` in practice.
                        format: int64
                        nullable: true
                        type: integer
                      snapshotID:
                        description: |-
                          Pin an exact kopia snapshot by ID. Renamed to match the ADR wire shape
                          exactly (`snapshotID`, capital `ID`).
                        nullable: true
                        type: string
                      sourcePath:
                        description: The kopia source path to match; absent matches any path for the identity.
                        nullable: true
                        type: string
                      username:
                        description: The kopia `username` to match.
                        type: string
                    required:
                    - hostname
                    - username
                    type: object
                  snapshotRef:
                    description: A `Snapshot` CR (scheduled, manual, or discovered — all the same kind). Default mode.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      namespace:
                        description: Namespace of the referenced object; absent = same namespace as the referrer.
                        nullable: true
                        type: string
                    required:
                    - name
                    type: object
                type: object
              target:
                description: |-
                  Where to restore to — **required** (ADR-0005 §9): `pvc` (operator creates),
                  `pvcRef` (existing PVC), or `populator: {}` (passive populator mode, claimed
                  via a PVC's `spec.dataSourceRef`). The former empty-`target` form is removed;
                  a `Restore` with no `target` is now invalid (deserialization fails).
                oneOf:
                - required:
                  - pvc
                - required:
                  - pvcRef
                - required:
                  - populator
                properties:
                  populator:
                    description: |-
                      Passive populator mode: no workload target at provision time — the restore is
                      claimed by a PVC's `spec.dataSourceRef` (ADR-0005 §9). An (empty) sub-object so
                      future populator knobs slot in without API breakage.
                    type: object
                  pvc:
                    description: Operator creates the PVC.
                    properties:
                      accessModes:
                        description: Access modes for the new PVC (e.g. `["ReadWriteOnce"]`).
                        items:
                          type: string
                        type: array
                      capacity:
                        description: Requested size of the new PVC (e.g. `100Gi`).
                        nullable: true
                        type: string
                      name:
                        description: Name of the PVC to create.
                        type: string
                      storageClassName:
                        description: StorageClass for the new PVC; absent uses the cluster default.
                        nullable: true
                        type: string
                    required:
                    - name
                    type: object
                  pvcRef:
                    description: Write into an existing PVC.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      namespace:
                        description: Namespace of the referenced object; absent = same namespace as the referrer.
                        nullable: true
                        type: string
                    required:
                    - name
                    type: object
                type: object
            required:
            - source
            - target
            type: object
            x-kubernetes-validations:
            - message: exactly one of target.pvc, target.pvcRef, target.populator
              rule: '[has(self.target.pvc), has(self.target.pvcRef), has(self.target.populator)].filter(x, x).size() == 1'
          status:
            description: Observed state of a [`Restore`], written by the controller/mover. ADR §3.6 status.
            nullable: true
            properties:
              conditions:
                description: Standard Kubernetes conditions carrying the human-readable status/reason.
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: message is a human readable message indicating details about the transition. This may be an empty string.
                      type: string
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failure:
                description: |-
                  Structured terminal-failure detail (kopia error class, stderr tail, retry
                  hint), written by the mover before it exits non-zero. ADR §4.10.
                nullable: true
                properties:
                  exitCode:
                    description: The process exit code, if one was reported.
                    format: int32
                    nullable: true
                    type: integer
                  kopiaErrorClass:
                    description: kopia error class (e.g. `RepositoryUnavailable`, `AuthFailure`).
                    type: string
                  message:
                    description: 'A short human-readable message: what failed, why, and how to fix it.'
                    type: string
                  retryRecommended:
                    description: Whether retrying the same operation unchanged could succeed.
                    type: boolean
                  stderrTail:
                    description: |-
                      The last lines of kopia's stderr, if any were captured (bounded by
                      [`MAX_LOG_TAIL_BYTES`]).
                    nullable: true
                    type: string
                required:
                - kopiaErrorClass
                - message
                - retryRecommended
                type: object
              logTail:
                description: |-
                  The last lines of the run's output, written by the mover at the terminal
                  transition (success: the `Restore completed: snapshot <id>` line; failure:
                  the actionable error + kopia stderr tail). Capped at
                  [`crate::common::MAX_LOG_TAIL_BYTES`]; full logs live in the Job pod.
                nullable: true
                type: string
              observedGeneration:
                description: '`metadata.generation` last reconciled, so stale status is detectable.'
                format: int64
                nullable: true
                type: integer
              phase:
                description: Lifecycle phase of a restore. Closed enum. ADR §3.6 status.
                enum:
                - Pending
                - Resolving
                - Restoring
                - Completed
                - Failed
                nullable: true
                type: string
              progress:
                description: Bytes/files restored so far, patched periodically by the mover.
                nullable: true
                properties:
                  bytesRestored:
                    description: Total bytes restored so far.
                    format: int64
                    nullable: true
                    type: integer
                  filesRestored:
                    description: Total files restored so far.
                    format: int64
                    nullable: true
                    type: integer
                type: object
              resolved:
                description: Pinned at admission; never re-resolved. ADR §3.6/§4.6.
                nullable: true
                properties:
                  identity:
                    description: The resolved kopia identity (`username@hostname:path`) of the snapshot.
                    nullable: true
                    properties:
                      hostname:
                        description: The final `hostname` kopia records, fixed at admission.
                        type: string
                      sourcePath:
                        description: The resolved snapshot source path, when applicable (`username@hostname:path`).
                        nullable: true
                        type: string
                      username:
                        description: The final `username` kopia records, fixed at admission.
                        type: string
                    required:
                    - hostname
                    - username
                    type: object
                  kopiaSnapshotID:
                    description: |-
                      The exact kopia snapshot manifest id the source resolved to. Pinned once;
                      subsequent reconciles restore THIS id even if newer snapshots appear, so a
                      restore never silently retargets (ADR §4.6). Matches
                      `Snapshot.status.snapshot.kopiaSnapshotID`.
                    nullable: true
                    type: string
                  pinnedAt:
                    description: Timestamp at which the source was pinned (RFC3339).
                    nullable: true
                    type: string
                  repository:
                    description: The repository the snapshot lives in, resolved from the source.
                    nullable: true
                    properties:
                      kind:
                        default: Repository
                        description: Which repository CRD this points at; defaults to [`RepositoryKind::Repository`].
                        enum:
                        - Repository
                        - ClusterRepository
                        type: string
                      name:
                        description: Name of the referenced `Repository`/`ClusterRepository`.
                        type: string
                      namespace:
                        description: Cross-namespace `Repository` reference; ignored/forbidden for `ClusterRepository`.
                        nullable: true
                        type: string
                    required:
                    - name
                    type: object
                  snapshotRef:
                    description: The concrete `Snapshot` CR the source resolved to, when applicable.
                    nullable: true
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      namespace:
                        description: Namespace of the referenced object; absent = same namespace as the referrer.
                        nullable: true
                        type: string
                    required:
                    - name
                    type: object
                type: object
              sourceKind:
                description: |-
                  The pinned source kind (`RestoreSource::kind_str` — `SnapshotRef`/`FromPolicy`/
                  `Identity`), set by the reconciler. Backs the `SOURCE` printer column so
                  `kubectl get restores` shows where a restore reads from. ADR-0005 §3.
                nullable: true
                type: string
              target:
                description: Resolved target details (the PVC written to / populator handshake).
                nullable: true
                properties:
                  pvcPrime:
                    description: Populator handshake (passive / pvc-create modes). ADR §3.6.
                    nullable: true
                    type: string
                  pvcRef:
                    description: The PVC actually written to (created or pre-existing).
                    nullable: true
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      namespace:
                        description: Namespace of the referenced object; absent = same namespace as the referrer.
                        nullable: true
                        type: string
                    required:
                    - name
                    type: object
                type: object
              timing:
                description: Start/end timestamps for the restore run.
                nullable: true
                properties:
                  endTime:
                    description: When the restore reached a terminal phase (RFC3339).
                    nullable: true
                    type: string
                  startTime:
                    description: When the mover began restoring (RFC3339).
                    nullable: true
                    type: string
                type: object
            type: object
        required:
        - spec
        title: Restore
        type: object
    served: true
    storage: true
    subresources:
      status: {}
