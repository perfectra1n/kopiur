suite: rbac
release:
  name: kopiur
  namespace: kopiur-system
templates:
  - role.yaml
  - clusterrole.yaml
tests:
  - it: namespaced scope renders a Role and no ClusterRole
    set:
      installScope: namespaced
      # Isolate base scope behavior from the self-mode webhook-cert RBAC (which
      # adds a small ClusterRole from role.yaml — covered separately below).
      webhook.enabled: false
    asserts:
      - hasDocuments:
          count: 1
        template: role.yaml
      - isKind:
          of: Role
        template: role.yaml
      - hasDocuments:
          count: 0
        template: clusterrole.yaml

  # --- self-managed webhook TLS RBAC (webhook.tls.mode: self) ----------------

  - it: "self mode (cluster) grants webhook-config patch + secret writes in the ClusterRole"
    set:
      installScope: cluster
      webhook.tls.mode: self
    template: clusterrole.yaml
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["admissionregistration.k8s.io"]
            resources: [validatingwebhookconfigurations, mutatingwebhookconfigurations]
            resourceNames: [kopiur-validating, kopiur-mutating]
            verbs: [get, patch]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [secrets]
            verbs: [create]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [secrets]
            resourceNames: [kopiur-webhook-tls]
            verbs: [update, patch]

  - it: "cert-manager mode does NOT grant the webhook-cert RBAC"
    set:
      installScope: cluster
      webhook.tls.mode: cert-manager
    template: clusterrole.yaml
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: ["admissionregistration.k8s.io"]
            resources: [validatingwebhookconfigurations, mutatingwebhookconfigurations]
            resourceNames: [kopiur-validating, kopiur-mutating]
            verbs: [get, patch]

  - it: "self mode (namespaced) adds a tightly-scoped ClusterRole + binding for the webhook-config patch"
    set:
      installScope: namespaced
      webhook.tls.mode: self
    template: role.yaml
    asserts:
      # Role + ClusterRole + ClusterRoleBinding.
      - hasDocuments:
          count: 3
      - isKind:
          of: ClusterRole
        documentIndex: 1
      - equal:
          path: metadata.name
          value: kopiur-webhook-cert
        documentIndex: 1
      - isKind:
          of: ClusterRoleBinding
        documentIndex: 2

  - it: cluster scope renders a ClusterRole and no Role
    set:
      installScope: cluster
    asserts:
      - hasDocuments:
          count: 1
        template: clusterrole.yaml
      - isKind:
          of: ClusterRole
        template: clusterrole.yaml
      - hasDocuments:
          count: 0
        template: role.yaml

  # --- credential projection + kopia web-UI server RBAC ----------------------
  #
  # The kopia web-UI server (spec.server) creates+deletes an operator-owned auth
  # Secret and a cross-namespace credentials mirror, and manages a Deployment +
  # Service. Because the feature is presence-driven per-Repository, secrets full
  # verbs + services + deployments are granted unconditionally (mirrors the
  # generated deploy/rbac/operator-{clusterrole,role}.yaml), independent of
  # secretProjection.enabled.

  - it: "ClusterRole grants full secrets verbs + services + deployments (server RBAC)"
    set:
      installScope: cluster
    template: clusterrole.yaml
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [secrets]
            verbs: [get, list, watch, create, update, patch, delete]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [services]
            verbs: [get, list, watch, create, update, patch, delete]
      - contains:
          path: rules
          content:
            apiGroups: [apps]
            resources: [deployments]
            verbs: [get, list, watch, create, update, patch, delete]

  - it: "secret writes are independent of secretProjection in the ClusterRole"
    set:
      installScope: cluster
      secretProjection.enabled: true
    template: clusterrole.yaml
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [secrets]
            verbs: [get, list, watch, create, update, patch, delete]

  - it: "namespaced Role grants full secrets verbs + services + deployments (server RBAC)"
    set:
      installScope: namespaced
      webhook.enabled: false
    template: role.yaml
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [secrets]
            verbs: [get, list, watch, create, update, patch, delete]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [services]
            verbs: [get, list, watch, create, update, patch, delete]
      - contains:
          path: rules
          content:
            apiGroups: [apps]
            resources: [deployments]
            verbs: [get, list, watch, create, update, patch, delete]
