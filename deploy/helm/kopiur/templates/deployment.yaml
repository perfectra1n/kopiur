apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kopiur.controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kopiur.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  # replicaCount > 1 is HA: the elected leader reconciles, others stand by.
  # Deterministic jitter (ADR §4.1) keeps schedules identical across failover.
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "kopiur.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kopiur.controller.selectorLabels" . | nindent 8 }}
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.controller.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kopiur.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: controller
          image: {{ include "kopiur.image" (dict "root" $ "img" .Values.image.controller) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.controller.leaderElection.enabled }}
            {{- if eq .Values.installScope "cluster" }}
            - --cluster-scope
            {{- else }}
            - --namespace={{ .Release.Namespace }}
            {{- end }}
            {{- with .Values.controller.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: RUST_LOG
              value: {{ .Values.controller.logLevel | quote }}
            - name: KOPIUR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # The mover image the controller stamps into every Backup/Restore Job.
            - name: KOPIUR_MOVER_IMAGE
              value: {{ include "kopiur.image" (dict "root" $ "img" .Values.image.mover) | quote }}
            - name: KOPIUR_MOVER_PULL_POLICY
              value: {{ .Values.image.mover.pullPolicy | quote }}
            # The mover PATCHes Backup/Restore .status, so its Job pods run as the
            # operator ServiceAccount (bound to the status-patch RBAC), not the
            # namespace default SA.
            - name: KOPIUR_MOVER_SERVICE_ACCOUNT
              value: {{ include "kopiur.serviceAccountName" . | quote }}
            {{- with .Values.controller.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.controller.probePort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- with .Values.controller.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.controller.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
