                    - full
                    - quick
                    type: object
                  takeoverPolicy:
                    description: What to do when another owner already holds the lease. Closed enum. ADR §3.7.
                    enum:
                    - Never
                    - PromptCondition
                    - Force
                    nullable: true
                    type: string
                type: object
            required:
