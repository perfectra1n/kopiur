apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: restores.kopiur.home-operations.com
spec:
  group: kopiur.home-operations.com
  names:
    categories:
    - kopiur
    kind: Restore
    plural: restores
    shortNames:
    - kopiarestore
    singular: restore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for RestoreSpec via `CustomResource`
        properties:
          spec:
            description: |-
              A restore operation. `target` is optional: absence = passive populator mode,
              consumed by a PVC's `spec.dataSourceRef`. ADR §3.6/§4.7.
              Desired state of a [`Restore`]: where to read from, where to write to, and how
              to behave when the snapshot is missing. ADR §3.6/§4.6.
            properties:
              options:
                description: kopia restore behavior (file deletion, permission/atomicity handling). ADR §4.6.
                nullable: true
                properties:
                  enableFileDeletion:
                    description: |-
                      Delete files in the target that are not present in the snapshot (make the
                      target an exact mirror). Off by default — additive restore is the safe default.
                    type: boolean
                  ignorePermissionErrors:
                    description: Default true; surfaces a condition if any errors occurred. ADR §4.6.
                    nullable: true
                    type: boolean
                  writeFilesAtomically:
                    description: Default true. ADR §4.6.
                    nullable: true
                    type: boolean
                type: object
              policy:
                description: Missing-snapshot handling and wait timeout. ADR §4.6 (G7).
                nullable: true
                properties:
                  onMissingSnapshot:
                    description: |-
                      What to do when the resolved source matches no snapshot. Closed enum. ADR §4.6 (G7).

                      ```
                      use kopiur_api::restore::OnMissingSnapshot;

                      // Fail-closed is the default so an explicit restore can't silently no-op.
                      assert_eq!(OnMissingSnapshot::default(), OnMissingSnapshot::Fail);
                      assert_eq!(serde_json::to_value(OnMissingSnapshot::Continue).unwrap(), "Continue");
                      ```
                    enum:
                    - Fail
                    - Continue
                    nullable: true
                    type: string
                  waitTimeout:
                    description: |-
                      How long to wait for the source snapshot to appear before giving up
                      (Go-style duration string, e.g. `5m`).
                    nullable: true
                    type: string
                type: object
              repository:
                description: Derived from `source` when omitted; REQUIRED only with `source.identity`. ADR §3.6/§4.6.
                nullable: true
                properties:
                  kind:
                    default: Repository
                    description: Which repository CRD this points at; defaults to [`RepositoryKind::Repository`].
                    enum:
                    - Repository
                    - ClusterRepository
                    type: string
                  name:
                    description: Name of the referenced `Repository`/`ClusterRepository`.
                    type: string
                  namespace:
                    description: Cross-namespace `Repository` reference; ignored/forbidden for `ClusterRepository`.
                    nullable: true
                    type: string
                required:
                - name
                type: object
              source:
                description: Exactly one source mode; webhook-enforced. ADR §3.6.
                oneOf:
                - required:
                  - backupRef
                - required:
                  - fromConfig
                - required:
                  - identity
                properties:
                  backupRef:
                    description: A `Backup` CR (scheduled, manual, or discovered — all the same kind). Default mode.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      namespace:
                        description: Namespace of the referenced object; absent = same namespace as the referrer.
                        nullable: true
                        type: string
                    required:
                    - name
                    type: object
                  fromConfig:
                    description: |-
                      A `BackupConfig` CR — resolves via identity even with no `Backup` CR present
                      (deploy-or-restore). Default `onMissingSnapshot: Continue`. ADR §4.6.
                    properties:
                      asOf:
                        description: Restore the newest snapshot at or before this RFC3339 timestamp (point-in-time).
                        nullable: true
                        type: string
                      name:
                        description: Name of the `BackupConfig` whose identity selects the snapshot.
                        type: string
                      namespace:
                        description: Namespace of the `BackupConfig`; absent = the `Restore`'s own namespace.
                        nullable: true
                        type: string
                      offset:
                        description: 0 = latest, 1 = previous, ... ADR §3.6.
                        format: int64
                        nullable: true
                        type: integer
                    required:
                    - name
                    type: object
                  identity:
                    description: A raw kopia identity (foreign writers / aged-out catalog). Requires `spec.repository`.
                    properties:
                      asOf:
                        description: Restore the newest snapshot at or before this RFC3339 timestamp (point-in-time).
                        nullable: true
                        type: string
                      hostname:
                        description: The kopia `hostname` to match.
                        type: string
                      offset:
                        description: 0 = latest, 1 = previous, ... mutually exclusive with `snapshotID`/`asOf` in practice.
                        format: int64
                        nullable: true
                        type: integer
                      snapshotID:
                        description: |-
                          Pin an exact kopia snapshot by ID. Renamed to match the ADR wire shape
                          exactly (`snapshotID`, capital `ID`).
                        nullable: true
                        type: string
                      sourcePath:
                        description: The kopia source path to match; absent matches any path for the identity.
                        nullable: true
                        type: string
                      username:
                        description: The kopia `username` to match.
                        type: string
                    required:
                    - hostname
                    - username
                    type: object
                type: object
              target:
                description: Absence = passive populator mode. ADR §3.6/§4.7.
                nullable: true
                oneOf:
                - required:
                  - pvc
                - required:
                  - pvcRef
                properties:
                  pvc:
                    description: Operator creates the PVC.
                    properties:
                      accessModes:
                        description: Access modes for the new PVC (e.g. `["ReadWriteOnce"]`).
                        items:
                          type: string
                        type: array
                      capacity:
                        description: Requested size of the new PVC (e.g. `100Gi`).
                        nullable: true
                        type: string
                      name:
                        description: Name of the PVC to create.
                        type: string
                      storageClassName:
                        description: StorageClass for the new PVC; absent uses the cluster default.
                        nullable: true
                        type: string
                    required:
                    - name
                    type: object
                  pvcRef:
                    description: Write into an existing PVC.
                    properties:
                      name:
