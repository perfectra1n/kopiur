apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: backupconfigs.kopiur.home-operations.com
spec:
  group: kopiur.home-operations.com
  names:
    categories:
    - kopiur
    kind: BackupConfig
    plural: backupconfigs
    shortNames:
    - kopiabc
    singular: backupconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.repository.name
      name: Repository
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for BackupConfigSpec via `CustomResource`
        properties:
          spec:
            description: |-
              *What* to back up: sources, identity, retention, policy, hooks. ADR §3.3.

              Not `Eq`: transitively embeds k8s-openapi types via `mover` and `hooks` (`JobSpec`).
            properties:
              copyMethod:
                description: |-
                  Volume snapshot copy method. Closed enum. ADR §3.3.

                  ```
                  use kopiur_api::CopyMethod;

                  // Defaults to a point-in-time CSI snapshot.
                  assert_eq!(CopyMethod::default(), CopyMethod::Snapshot);
                  // Serializes as a bare PascalCase string (no external tagging — it has no payload).
                  assert_eq!(serde_json::to_value(CopyMethod::Snapshot).unwrap(), "Snapshot");
                  assert_eq!(serde_json::to_value(CopyMethod::Direct).unwrap(), "Direct");
                  ```
                enum:
                - Snapshot
                - Clone
                - Direct
                nullable: true
                type: string
              defaultDeletionPolicy:
                description: |-
                  Lifecycle of the underlying kopia snapshot when its `Backup` CR is deleted.
                  Shared by `BackupConfig.spec.defaultDeletionPolicy` and `Backup.spec.deletionPolicy`.
                  ADR-0003 §4.5 / ADR-0001 §4.5.

                  The reconciler distinguishes the three cases with an exhaustive `match` — Rust
                  enforces that any new variant added later must be handled in every match site,
                  preventing the class of bug where a new policy slips into production without a
                  corresponding reconcile branch.

                  ```
                  use kopiur_api::common::DeletionPolicy;

                  // Produced backups default to deleting the snapshot with the CR.
                  assert_eq!(DeletionPolicy::default(), DeletionPolicy::Delete);
                  // Variants serialize to their bare PascalCase names (plain string enum).
                  assert_eq!(serde_json::to_value(DeletionPolicy::Retain).unwrap(), "Retain");
                  assert_eq!(serde_json::to_value(DeletionPolicy::Orphan).unwrap(), "Orphan");
                  ```
                enum:
                - Delete
                - Retain
                - Orphan
                nullable: true
                type: string
              groupBy:
                description: |-
                  Multi-PVC grouping strategy. Closed enum. ADR §4.9.

                  Defaults to a consistent group snapshot; `None` must be set *explicitly* to
                  accept independent per-PVC snapshots, because a silent per-PVC fallback would
                  produce inconsistent backups (the data-integrity hazard ADR §4.9 guards against).

                  ```
                  use kopiur_api::GroupBy;

                  assert_eq!(GroupBy::default(), GroupBy::VolumeGroupSnapshot);
                  assert_eq!(serde_json::to_value(GroupBy::None).unwrap(), "None");
                  ```
                enum:
                - VolumeGroupSnapshot
                - None
                nullable: true
                type: string
              hooks:
                description: Pre/post snapshot hooks that run in the workload, not the mover. ADR §4.8 (G13).
                nullable: true
                properties:
                  afterSnapshot:
                    description: |-
                      Hooks run (in order) after the snapshot completes — e.g. resuming the
                      workload. ADR §4.8.
                    items:
                      description: |-
                        One of three hook forms. ADR §4.8.

                        Externally-tagged: wire shape is `{ workloadExec: {...} }`, `{ runJob: {...} }`,
                        or `{ httpRequest: {...} }`. Exactly one variant by construction.

                        Not `Eq`: `RunJob` embeds `JobSpec` (k8s-openapi, `PartialEq` only).

                        ```
                        use kopiur_api::backup_config::{Hook, HttpRequestHook};

                        // Construct directly — the type system guarantees exactly one variant.
                        let hook = Hook::HttpRequest(HttpRequestHook {
                            url: "https://example/notify".into(),
                            method: Some("POST".into()),
                            body: None,
                            timeout: None,
                            continue_on_failure: false,
                        });
                        assert_eq!(hook.kind_str(), "HttpRequest");

                        // Externally tagged on the wire: `{ httpRequest: { url: ... } }`.
                        let json = serde_json::to_value(&hook).unwrap();
                        assert_eq!(json["httpRequest"]["url"], "https://example/notify");
                        ```
                      oneOf:
                      - required:
                        - workloadExec
                      - required:
                        - runJob
                      - required:
                        - httpRequest
                      properties:
                        httpRequest:
                          description: Typed POST to a URL for cross-system orchestration.
                          properties:
                            body:
                              description: Optional request body. ADR §4.8.
                              nullable: true
                              type: string
                            continueOnFailure:
                              description: 'If `true`, a failed request does not abort the backup (default: abort). ADR §4.8.'
                              type: boolean
                            method:
                              description: HTTP method (default `POST`). ADR §4.8.
                              nullable: true
                              type: string
                            timeout:
                              description: Max time to wait for the response (Go duration string). ADR §4.8.
                              nullable: true
                              type: string
                            url:
                              description: Target URL to call. ADR §4.8.
                              type: string
                          required:
                          - url
                          type: object
                        runJob:
                          description: |-
                            Full `JobSpec` run as a one-shot Job (k8up `PreBackupPod` analog).

                            Boxed: `RunJobHook` embeds a `JobSpec` (~2 KB), which would otherwise bloat
                            every `Hook` (incl. the common `WorkloadExec`). `Box<T>` is transparent to
                            serde, so the externally-tagged `{ runJob: {...} }` wire shape is unchanged.
                          properties:
                            continueOnFailure:
                              description: 'If `true`, a failed Job does not abort the backup (default: abort). ADR §4.8.'
                              type: boolean
                            jobSpec:
                              description: The full Kubernetes `JobSpec` to run. ADR §4.8.
                              properties:
                                activeDeadlineSeconds:
                                  description: Specifies the duration in seconds relative to the startTime that the job may be continuously active before the system tries to terminate it; value must be positive integer. If a Job is suspended (at creation or through an update), this timer will effectively be stopped and reset when the Job is resumed again.
                                  format: int64
                                  type: integer
                                backoffLimit:
                                  description: Specifies the number of retries before marking this job failed. Defaults to 6
                                  format: int32
                                  type: integer
                                backoffLimitPerIndex:
                                  description: Specifies the limit for the number of retries within an index before marking this index as failed. When enabled the number of failures per index is kept in the pod's batch.kubernetes.io/job-index-failure-count annotation. It can only be set when Job's completionMode=Indexed, and the Pod's restart policy is Never. The field is immutable.
                                  format: int32
                                  type: integer
                                completionMode:
                                  description: |-
                                    completionMode specifies how Pod completions are tracked. It can be `NonIndexed` (default) or `Indexed`.

                                    `NonIndexed` means that the Job is considered complete when there have been .spec.completions successfully completed Pods. Each Pod completion is homologous to each other.

                                    `Indexed` means that the Pods of a Job get an associated completion index from 0 to (.spec.completions - 1), available in the annotation batch.kubernetes.io/job-completion-index. The Job is considered complete when there is one successfully completed Pod for each index. When value is `Indexed`, .spec.completions must be specified and `.spec.parallelism` must be less than or equal to 10^5. In addition, The Pod name takes the form `$(job-name)-$(index)-$(random-string)`, the Pod hostname takes the form `$(job-name)-$(index)`.

                                    More completion modes can be added in the future. If the Job controller observes a mode that it doesn't recognize, which is possible during upgrades due to version skew, the controller skips updates for the Job.
                                  type: string
                                completions:
                                  description: 'Specifies the desired number of successfully finished pods the job should be run with.  Setting to null means that the success of any pod signals the success of all pods, and allows parallelism to have any positive value.  Setting to 1 means that parallelism is limited to 1 and the success of that pod signals the success of the job. More info: https://kubernetes.io/docs/concepts/workloads/controllers/jobs-run-to-completion/'
                                  format: int32
                                  type: integer
                                managedBy:
                                  description: |-
                                    ManagedBy field indicates the controller that manages a Job. The k8s Job controller reconciles jobs which don't have this field at all or the field value is the reserved string `kubernetes.io/job-controller`, but skips reconciling Jobs with a custom value for this field. The value must be a valid domain-prefixed path (e.g. acme.io/foo) - all characters before the first "/" must be a valid subdomain as defined by RFC 1123. All characters trailing the first "/" must be valid HTTP Path characters as defined by RFC 3986. The value cannot exceed 63 characters. This field is immutable.

                                    This field is beta-level. The job controller accepts setting the field when the feature gate JobManagedBy is enabled (enabled by default).
                                  type: string
                                manualSelector:
                                  description: 'manualSelector controls generation of pod labels and pod selectors. Leave `manualSelector` unset unless you are certain what you are doing. When false or unset, the system pick labels unique to this job and appends those labels to the pod template.  When true, the user is responsible for picking unique labels and specifying the selector.  Failure to pick a unique label may cause this and other jobs to not function correctly.  However, You may see `manualSelector=true` in jobs that were created with the old `extensions/v1beta1` API. More info: https://kubernetes.io/docs/concepts/workloads/controllers/jobs-run-to-completion/#specifying-your-own-pod-selector'
                                  type: boolean
                                maxFailedIndexes:
                                  description: Specifies the maximal number of failed indexes before marking the Job as failed, when backoffLimitPerIndex is set. Once the number of failed indexes exceeds this number the entire Job is marked as Failed and its execution is terminated. When left as null the job continues execution of all of its indexes and is marked with the `Complete` Job condition. It can only be specified when backoffLimitPerIndex is set. It can be null or up to completions. It is required and must be less than or equal to 10^4 when is completions greater than 10^5.
                                  format: int32
                                  type: integer
                                parallelism:
                                  description: 'Specifies the maximum desired number of pods the job should run at any given time. The actual number of pods running in steady state will be less than this number when ((.spec.completions - .status.successful) < .spec.parallelism), i.e. when the work left to do is less than max parallelism. More info: https://kubernetes.io/docs/concepts/workloads/controllers/jobs-run-to-completion/'
                                  format: int32
                                  type: integer
                                podFailurePolicy:
                                  description: Specifies the policy of handling failed pods. In particular, it allows to specify the set of actions and conditions which need to be satisfied to take the associated action. If empty, the default behaviour applies - the counter of failed pods, represented by the jobs's .status.failed field, is incremented and it is checked against the backoffLimit. This field cannot be used in combination with restartPolicy=OnFailure.
                                  properties:
                                    rules:
                                      description: A list of pod failure policy rules. The rules are evaluated in order. Once a rule matches a Pod failure, the remaining of the rules are ignored. When no rule matches the Pod failure, the default handling applies - the counter of pod failures is incremented and it is checked against the backoffLimit. At most 20 elements are allowed.
                                      items:
                                        description: PodFailurePolicyRule describes how a pod failure is handled when the requirements are met. One of onExitCodes and onPodConditions, but not both, can be used in each rule.
                                        properties:
                                          action:
                                            description: |-
                                              Specifies the action taken on a pod failure when the requirements are satisfied. Possible values are:

                                              - FailJob: indicates that the pod's job is marked as Failed and all
                                                running pods are terminated.
                                              - FailIndex: indicates that the pod's index is marked as Failed and will
                                                not be restarted.
                                              - Ignore: indicates that the counter towards the .backoffLimit is not
                                                incremented and a replacement pod is created.
                                              - Count: indicates that the pod is handled in the default way - the
                                                counter towards the .backoffLimit is incremented.
                                              Additional values are considered to be added in the future. Clients should react to an unknown action by skipping the rule.
                                            type: string
                                          onExitCodes:
                                            description: Represents the requirement on the container exit codes.
                                            properties:
                                              containerName:
                                                description: Restricts the check for exit codes to the container with the specified name. When null, the rule applies to all containers. When specified, it should match one the container or initContainer names in the pod template.
                                                type: string
                                              operator:
                                                description: |-
                                                  Represents the relationship between the container exit code(s) and the specified values. Containers completed with success (exit code 0) are excluded from the requirement check. Possible values are:

                                                  - In: the requirement is satisfied if at least one container exit code
                                                    (might be multiple if there are multiple containers not restricted
                                                    by the 'containerName' field) is in the set of specified values.
                                                  - NotIn: the requirement is satisfied if at least one container exit code
                                                    (might be multiple if there are multiple containers not restricted
                                                    by the 'containerName' field) is not in the set of specified values.
                                                  Additional values are considered to be added in the future. Clients should react to an unknown operator by assuming the requirement is not satisfied.
                                                type: string
                                              values:
                                                description: Specifies the set of values. Each returned container exit code (might be multiple in case of multiple containers) is checked against this set of values with respect to the operator. The list of values must be ordered and must not contain duplicates. Value '0' cannot be used for the In operator. At least one element is required. At most 255 elements are allowed.
                                                items:
                                                  format: int32
                                                  type: integer
                                                type: array
                                            required:
                                            - operator
                                            - values
                                            type: object
                                          onPodConditions:
                                            description: Represents the requirement on the pod conditions. The requirement is represented as a list of pod condition patterns. The requirement is satisfied if at least one pattern matches an actual pod condition. At most 20 elements are allowed.
                                            items:
                                              description: PodFailurePolicyOnPodConditionsPattern describes a pattern for matching an actual pod condition type.
                                              properties:
                                                status:
                                                  description: Specifies the required Pod condition status. To match a pod condition it is required that the specified status equals the pod condition status. Defaults to True.
                                                  type: string
                                                type:
                                                  description: Specifies the required Pod condition type. To match a pod condition it is required that specified type equals the pod condition type.
                                                  type: string
                                              required:
                                              - status
                                              - type
                                              type: object
                                            type: array
                                        required:
                                        - action
                                        type: object
                                      type: array
                                  required:
                                  - rules
                                  type: object
                                podReplacementPolicy:
                                  description: |-
                                    podReplacementPolicy specifies when to create replacement Pods. Possible values are: - TerminatingOrFailed means that we recreate pods
                                      when they are terminating (has a metadata.deletionTimestamp) or failed.
                                    - Failed means to wait until a previously created Pod is fully terminated (has phase
                                      Failed or Succeeded) before creating a replacement Pod.

                                    When using podFailurePolicy, Failed is the the only allowed value. TerminatingOrFailed and Failed are allowed values when podFailurePolicy is not in use. This is an beta field. To use this, enable the JobPodReplacementPolicy feature toggle. This is on by default.
                                  type: string
                                selector:
                                  description: 'A label query over pods that should match the pod count. Normally, the system sets this field for you. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/#label-selectors'
                                  properties:
                                    matchExpressions:
                                      description: matchExpressions is a list of label selector requirements. The requirements are ANDed.
                                      items:
                                        description: A label selector requirement is a selector that contains values, a key, and an operator that relates the key and values.
                                        properties:
                                          key:
                                            description: key is the label key that the selector applies to.
                                            type: string
                                          operator:
                                            description: operator represents a key's relationship to a set of values. Valid operators are In, NotIn, Exists and DoesNotExist.
                                            type: string
                                          values:
                                            description: values is an array of string values. If the operator is In or NotIn, the values array must be non-empty. If the operator is Exists or DoesNotExist, the values array must be empty. This array is replaced during a strategic merge patch.
                                            items:
                                              type: string
                                            type: array
                                        required:
                                        - key
                                        - operator
                                        type: object
                                      type: array
                                    matchLabels:
                                      additionalProperties:
                                        type: string
                                      description: matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels map is equivalent to an element of matchExpressions, whose key field is "key", the operator is "In", and the values array contains only "value". The requirements are ANDed.
                                      type: object
                                  type: object
                                successPolicy:
