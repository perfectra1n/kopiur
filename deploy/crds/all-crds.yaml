                            description: Indicates that the container must run as a non-root user. If true, the Kubelet will validate the image at runtime to ensure that it does not run as UID 0 (root) and fail to start the container if it does. If unset or false, no such validation will be performed. May also be set in PodSecurityContext.  If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
                            type: boolean
                          runAsUser:
                            description: The UID to run the entrypoint of the container process. Defaults to user specified in image metadata if unspecified. May also be set in PodSecurityContext.  If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence. Note that this field cannot be set when spec.os.name is windows.
                            format: int64
                            type: integer
                          seLinuxOptions:
                            description: The SELinux context to be applied to the container. If unspecified, the container runtime will allocate a random SELinux context for each container.  May also be set in PodSecurityContext.  If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence. Note that this field cannot be set when spec.os.name is windows.
                            properties:
                              level:
                                description: Level is SELinux level label that applies to the container.
                                type: string
                              role:
                                description: Role is a SELinux role label that applies to the container.
                                type: string
                              type:
                                description: Type is a SELinux type label that applies to the container.
                                type: string
                              user:
                                description: User is a SELinux user label that applies to the container.
                                type: string
                            type: object
                          seccompProfile:
                            description: The seccomp options to use by this container. If seccomp options are provided at both the pod & container level, the container options override the pod options. Note that this field cannot be set when spec.os.name is windows.
                            properties:
                              localhostProfile:
                                description: localhostProfile indicates a profile defined in a file on the node should be used. The profile must be preconfigured on the node to work. Must be a descending path, relative to the kubelet's configured seccomp profile location. Must be set if type is "Localhost". Must NOT be set for any other type.
                                type: string
                              type:
                                description: |-
                                  type indicates which kind of seccomp profile will be applied. Valid options are:

                                  Localhost - a profile defined in a file on the node should be used. RuntimeDefault - the container runtime default profile should be used. Unconfined - no profile should be applied.
                                type: string
                            required:
                            - type
                            type: object
                          windowsOptions:
                            description: The Windows specific settings applied to all containers. If unspecified, the options from the PodSecurityContext will be used. If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence. Note that this field cannot be set when spec.os.name is linux.
                            properties:
                              gmsaCredentialSpec:
                                description: GMSACredentialSpec is where the GMSA admission webhook (https://github.com/kubernetes-sigs/windows-gmsa) inlines the contents of the GMSA credential spec named by the GMSACredentialSpecName field.
                                type: string
                              gmsaCredentialSpecName:
                                description: GMSACredentialSpecName is the name of the GMSA credential spec to use.
                                type: string
                              hostProcess:
                                description: HostProcess determines if a container should be run as a 'Host Process' container. All of a Pod's containers must have the same effective HostProcess value (it is not allowed to have a mix of HostProcess containers and non-HostProcess containers). In addition, if HostProcess is true then HostNetwork must also be set to true.
                                type: boolean
                              runAsUserName:
                                description: The UserName in Windows to run the entrypoint of the container process. Defaults to the user specified in image metadata if unspecified. May also be set in PodSecurityContext. If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
                                type: string
                            type: object
                        type: object
                    type: object
                  namespace:
                    description: |-
                      **ClusterRepository only** — namespace the managed (namespaced)
                      `Maintenance` CR is created in. Defaults to the operator's own namespace.
                      Forbidden on a namespaced `Repository` (its `Maintenance` always lives in
                      the repository's namespace), rejected by the admission webhook.
                    nullable: true
                    type: string
                  schedule:
                    description: |-
                      Schedule override. When absent, the operator uses
                      [`default_maintenance_schedule`] (quick 6h / full daily).
                    nullable: true
                    properties:
                      full:
                        description: Cron + jitter for `kopia maintenance run --full` (content reclamation).
                        properties:
                          cron:
                            description: |-
                              The cron expression, parsed by `croner`. May contain an `H` placeholder for
                              deterministic per-schedule jitter (ADR §3.7).
                            type: string
                          jitter:
                            description: |-
                              Optional deterministic jitter window as a Go-style duration string (e.g.
                              `30m`), derived from `(scheduleUID, slot)` so it is stable across restarts.
                            nullable: true
                            type: string
                        required:
                        - cron
                        type: object
                      quick:
                        description: Cron + jitter for `kopia maintenance run` (quick = cheap index/log work).
                        properties:
                          cron:
                            description: |-
                              The cron expression, parsed by `croner`. May contain an `H` placeholder for
                              deterministic per-schedule jitter (ADR §3.7).
                            type: string
                          jitter:
                            description: |-
                              Optional deterministic jitter window as a Go-style duration string (e.g.
                              `30m`), derived from `(scheduleUID, slot)` so it is stable across restarts.
                            nullable: true
                            type: string
                        required:
                        - cron
                        type: object
                      timezone:
                        description: IANA timezone both crons are evaluated in; absent means controller default.
                        nullable: true
                        type: string
                    required:
                    - full
                    - quick
                    type: object
                  takeoverPolicy:
                    description: |-
                      What to do when another owner already holds the lease. Closed enum. ADR §3.7.

                      ```
                      use kopiur_api::TakeoverPolicy;

                      // The safest default: never seize a lease another owner holds.
                      assert_eq!(TakeoverPolicy::default(), TakeoverPolicy::Never);
                      assert_eq!(
                          serde_json::to_value(TakeoverPolicy::PromptCondition).unwrap(),
                          serde_json::json!("PromptCondition"),
                      );
                      ```
                    enum:
                    - Never
                    - PromptCondition
                    - Force
                    nullable: true
                    type: string
                type: object
            required:
            - allowedNamespaces
            - backend
            - encryption
            type: object
          status:
            description: Mirrors `RepositoryStatus` (ADR §3.1) plus `allowedNamespaceCount`. ADR §3.2.
            nullable: true
            properties:
              allowedNamespaceCount:
                description: Number of namespaces currently resolved by `spec.allowedNamespaces`. ADR §3.2.
                format: int64
                nullable: true
                type: integer
              backend:
                description: Mirror of `spec.backend` discriminant for the print column.
                nullable: true
                type: string
              catalog:
                description: Catalog-materialization status (discovered-backup count, last refresh).
                nullable: true
                properties:
                  discoveredBackupCount:
                    description: How many `Backup` CRs were materialized from the catalog scan.
                    format: int64
                    nullable: true
                    type: integer
                  lastRefreshAt:
                    description: RFC 3339 timestamp of the last catalog refresh.
                    nullable: true
                    type: string
                type: object
              conditions:
                description: Standard Kubernetes conditions (e.g. `Connected`, `MaintenanceOwned`). ADR §3.2.
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: message is a human readable message indicating details about the transition. This may be an empty string.
                      type: string
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: '`metadata.generation` of the `spec` last reconciled; drives staleness detection.'
                format: int64
                nullable: true
                type: integer
              phase:
                description: |-
                  Lifecycle phase of a repository. ADR §3.1 status.

                  A freshly admitted CR starts in the `#[default]` [`RepositoryPhase::Pending`]:

                  ```
                  use kopiur_api::repository::RepositoryPhase;

                  assert_eq!(RepositoryPhase::default(), RepositoryPhase::Pending);
                  // Serializes as a bare string (closed unit enum).
                  assert_eq!(
                      serde_json::to_value(RepositoryPhase::Ready).unwrap(),
                      serde_json::json!("Ready")
                  );
                  ```
                enum:
                - Pending
                - Initializing
                - Ready
                - Degraded
                - Failed
                nullable: true
                type: string
              storageStats:
                description: Repository size and snapshot counts from the last catalog scan.
                nullable: true
                properties:
                  lastObservedAt:
                    description: RFC 3339 timestamp these stats were last observed.
                    nullable: true
                    type: string
                  snapshotCount:
                    description: Total snapshots present in the repository (across all identities).
                    format: int64
                    nullable: true
                    type: integer
                  totalSize:
                    description: Human-readable total on-disk size (e.g. `412Gi`).
                    nullable: true
                    type: string
                type: object
              uniqueId:
                description: Kopia repository unique ID.
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: ClusterRepository
        type: object
    served: true
    storage: true
    subresources:
      status: {}
