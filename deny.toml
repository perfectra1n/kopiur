# cargo-deny configuration. Advisory in CI (the `audit` job is continue-on-error)
# but useful locally: `cargo deny check`.

[advisories]
version = 2
ignore = []

[licenses]
version = 2
# Allowed licenses. The first entry is the project's OWN license (the workspace
# crates declare AGPL-3.0-only via `license.workspace = true`); the rest are the
# permissive licenses we accept for the upstream crates we depend on.
allow = [
    "AGPL-3.0-only",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    # Community Data License Agreement — Permissive 2.0. Carried by
    # `webpki-roots` (the Mozilla CA root bundle), an unavoidable transitive
    # dependency via `kube`'s hyper-rustls and `reqwest`. The 1.0 line
    # relicensed the bundled CA data to CDLA-Permissive-2.0; the license is
    # permissive and imposes no copyleft on our code.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
