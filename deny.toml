# cargo-deny configuration. Advisory in CI (the `audit` job is continue-on-error)
# but useful locally: `cargo deny check`.

[advisories]
version = 2
ignore = []

[licenses]
version = 2
# Permissive dependency licenses we accept. The project itself is AGPL-3.0-only
# (see /LICENSE); these are the licenses allowed for upstream crates we depend on.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
