---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  versions:
    name: Versions
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      kopia-version: ${{ steps.versions.outputs.kopia-version }}
      rust-version: ${{ steps.versions.outputs.rust-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false
          experimental: true
          install: false

      - name: Resolve versions
        id: versions
        run: |
          echo "kopia-version=$(mise config get tools.kopia)" >> "$GITHUB_OUTPUT"
          echo "rust-version=$(mise config get tools.rust.version)" >> "$GITHUB_OUTPUT"

  # Build each component image in its own job (not a matrix over the reusable
  # workflow). The chart pins all three image digests at release time, and a
  # matrix collapses needs.<job>.outputs.digest to a single value — three
  # separate jobs keep each builder's first-class `digest` output addressable.
  release-controller:
    name: Release (controller)
    needs: versions
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: docker/github-builder/.github/workflows/build.yml@70ac3fc303efa83d2b94905e6ab78bb83cbdc2ae # v1.11.0
    with:
      build-args: |
        VERSION=${{ github.ref_name }}
        REVISION=${{ github.sha }}
        KOPIA_VERSION=${{ needs.versions.outputs.kopia-version }}
        RUST_VERSION=${{ needs.versions.outputs.rust-version }}
        BIN=kopiur-controller
      cache: true
      cache-scope: controller
      file: docker/Dockerfile
      meta-images: ghcr.io/${{ github.repository }}-controller
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=raw,value=rolling,enable=${{ github.event_name == 'release' }}
        type=ref,event=branch
      output: image
      platforms: linux/amd64,linux/arm64
      push: true
      sbom: true
      sign: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  release-webhook:
    name: Release (webhook)
    needs: versions
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: docker/github-builder/.github/workflows/build.yml@70ac3fc303efa83d2b94905e6ab78bb83cbdc2ae # v1.11.0
    with:
      build-args: |
        VERSION=${{ github.ref_name }}
        REVISION=${{ github.sha }}
        KOPIA_VERSION=${{ needs.versions.outputs.kopia-version }}
        RUST_VERSION=${{ needs.versions.outputs.rust-version }}
        BIN=kopiur-webhook
      cache: true
      cache-scope: webhook
      file: docker/Dockerfile
      meta-images: ghcr.io/${{ github.repository }}-webhook
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=raw,value=rolling,enable=${{ github.event_name == 'release' }}
        type=ref,event=branch
      output: image
      platforms: linux/amd64,linux/arm64
      push: true
      sbom: true
      sign: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  release-mover:
    name: Release (mover)
    needs: versions
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: docker/github-builder/.github/workflows/build.yml@70ac3fc303efa83d2b94905e6ab78bb83cbdc2ae # v1.11.0
    with:
      build-args: |
        VERSION=${{ github.ref_name }}
        REVISION=${{ github.sha }}
        KOPIA_VERSION=${{ needs.versions.outputs.kopia-version }}
        RUST_VERSION=${{ needs.versions.outputs.rust-version }}
      cache: true
      cache-scope: mover
      file: docker/Dockerfile.mover
      meta-images: ghcr.io/${{ github.repository }}-mover
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=raw,value=rolling,enable=${{ github.event_name == 'release' }}
        type=ref,event=branch
      output: image
      platforms: linux/amd64,linux/arm64
      push: true
      sbom: true
      sign: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  helm:
    name: Helm
    needs:
      - release-controller
      - release-webhook
      - release-mover
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false
          experimental: true
          install_args: --locked

      - name: Check generated manifests
        run: cargo xtask gen-all --check

      # Pin all three component images to the exact digests the builder produced
      # — each build job's first-class `digest` output (the signed multi-arch
      # index) — so the released chart references immutable images instead of
      # floating tags. Fail closed if any digest is missing. Only the packaged
      # copy is rewritten; the repo keeps empty digests (floating tags for dev).
      - name: Pin the released image digests into the chart
        env:
          CONTROLLER_DIGEST: ${{ needs.release-controller.outputs.digest }}
          WEBHOOK_DIGEST: ${{ needs.release-webhook.outputs.digest }}
          MOVER_DIGEST: ${{ needs.release-mover.outputs.digest }}
        run: |
          for pair in "controller:${CONTROLLER_DIGEST}" "webhook:${WEBHOOK_DIGEST}" "mover:${MOVER_DIGEST}"; do
            comp="${pair%%:*}"
            digest="${pair#*:}"
            case "${digest}" in
              sha256:*) ;;
              *) echo "build produced no digest for ${comp} (got: '${digest}')"; exit 1 ;;
            esac
            yq -i ".image.${comp}.digest = \"${digest}\"" deploy/helm/kopiur/values.yaml
            echo "pinned ${comp} -> ${digest}"
          done

      - name: Package Helm chart
        run: |
          VERSION="${VERSION#v}"
          helm package deploy/helm/kopiur \
            --version "${VERSION}" \
            --app-version "${VERSION}"

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Helm chart to GHCR
        run: |-
          VERSION="${VERSION#v}"
          helm push "kopiur-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
