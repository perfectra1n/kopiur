---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "plugins/**"
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  versions:
    name: Versions
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      kopia-version: ${{ steps.versions.outputs.kopia-version }}
      rust-version: ${{ steps.versions.outputs.rust-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false
          experimental: true
          install: false

      - name: Resolve versions
        id: versions
        run: |
          echo "kopia-version=$(mise config get tools.kopia)" >> "$GITHUB_OUTPUT"
          echo "rust-version=$(mise config get tools.rust.version)" >> "$GITHUB_OUTPUT"

  # Build each component image in its own job (not a matrix over the reusable
  # workflow). The chart pins all three image digests at release time, and a
  # matrix collapses needs.<job>.outputs.digest to a single value — three
  # separate jobs keep each builder's first-class `digest` output addressable.
  release-controller:
    name: Release (controller)
    needs: versions
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: docker/github-builder/.github/workflows/build.yml@5f637c833aa76bc99372a1dc9a6f8bcd8056fb85 # v1.12.0
    with:
      build-args: |
        VERSION=${{ github.ref_name }}
        REVISION=${{ github.sha }}
        KOPIA_VERSION=${{ needs.versions.outputs.kopia-version }}
        RUST_VERSION=${{ needs.versions.outputs.rust-version }}
        BIN=kopiur-controller
      cache: true
      cache-scope: controller
      file: docker/Dockerfile
      meta-images: ghcr.io/${{ github.repository }}-controller
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=raw,value=rolling,enable=${{ github.event_name == 'release' }}
        type=ref,event=branch
      output: image
      platforms: linux/amd64,linux/arm64
      push: true
      sbom: true
      sign: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  release-webhook:
    name: Release (webhook)
    needs: versions
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: docker/github-builder/.github/workflows/build.yml@5f637c833aa76bc99372a1dc9a6f8bcd8056fb85 # v1.12.0
    with:
      build-args: |
        VERSION=${{ github.ref_name }}
        REVISION=${{ github.sha }}
        KOPIA_VERSION=${{ needs.versions.outputs.kopia-version }}
        RUST_VERSION=${{ needs.versions.outputs.rust-version }}
        BIN=kopiur-webhook
      cache: true
      cache-scope: webhook
      file: docker/Dockerfile
      meta-images: ghcr.io/${{ github.repository }}-webhook
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=raw,value=rolling,enable=${{ github.event_name == 'release' }}
        type=ref,event=branch
      output: image
      platforms: linux/amd64,linux/arm64
      push: true
      sbom: true
      sign: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  release-mover:
    name: Release (mover)
    needs: versions
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: docker/github-builder/.github/workflows/build.yml@5f637c833aa76bc99372a1dc9a6f8bcd8056fb85 # v1.12.0
    with:
      build-args: |
        VERSION=${{ github.ref_name }}
        REVISION=${{ github.sha }}
        KOPIA_VERSION=${{ needs.versions.outputs.kopia-version }}
        RUST_VERSION=${{ needs.versions.outputs.rust-version }}
      cache: true
      cache-scope: mover
      file: docker/Dockerfile.mover
      meta-images: ghcr.io/${{ github.repository }}-mover
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=raw,value=rolling,enable=${{ github.event_name == 'release' }}
        type=ref,event=branch
      output: image
      platforms: linux/amd64,linux/arm64
      push: true
      sbom: true
      sign: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  helm:
    name: Helm
    needs:
      - release-controller
      - release-webhook
      - release-mover
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # keyless Cosign signing of the published chart
      packages: write
    env:
      VERSION: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false
          experimental: true
          install_args: --locked

      - name: Check generated manifests
        run: cargo xtask gen-all --check

      # Pin all three component images to the exact digests the builder produced
      # — each build job's first-class `digest` output (the signed multi-arch
      # index) — so the released chart references immutable images instead of
      # floating tags. Fail closed if any digest is missing. Only the packaged
      # copy is rewritten; the repo keeps empty digests (floating tags for dev).
      - name: Pin the released image digests into the chart
        env:
          CONTROLLER_DIGEST: ${{ needs.release-controller.outputs.digest }}
          WEBHOOK_DIGEST: ${{ needs.release-webhook.outputs.digest }}
          MOVER_DIGEST: ${{ needs.release-mover.outputs.digest }}
        run: |
          for pair in "controller:${CONTROLLER_DIGEST}" "webhook:${WEBHOOK_DIGEST}" "mover:${MOVER_DIGEST}"; do
            comp="${pair%%:*}"
            digest="${pair#*:}"
            case "${digest}" in
              sha256:*) ;;
              *) echo "build produced no digest for ${comp} (got: '${digest}')"; exit 1 ;;
            esac
            yq -i ".image.${comp}.digest = \"${digest}\"" deploy/helm/kopiur/values.yaml
            echo "pinned ${comp} -> ${digest}"
          done

      - name: Package Helm chart
        run: |
          helm package deploy/helm/kopiur \
            --version "${VERSION}" \
            --app-version "${VERSION}"

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Helm chart to GHCR
        run: |-
          helm push "kopiur-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Sign the published chart with Cosign
        run: |-
          cosign sign --yes "ghcr.io/${{ github.repository_owner }}/charts/kopiur:${VERSION}"

  # The kubectl plugin binaries (kubectl-kopiur). Native runners per target —
  # no QEMU, no cross-compilation toolchains beyond rustup target add:
  # GitHub's arm64 Linux runners build the aarch64-musl leg natively, and
  # macos-14 (arm) builds both darwin targets with the Apple toolchain.
  # Windows is best-effort (continue-on-error): krew simply omits platforms
  # whose asset is missing.
  plugin:
    name: Plugin (${{ matrix.target }})
    needs: versions
    if: ${{ github.event_name == 'release' }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.best-effort }}
    permissions:
      contents: write # gh release upload
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            asset: kopiur-cli_linux_amd64.tar.gz
            best-effort: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            asset: kopiur-cli_linux_arm64.tar.gz
            best-effort: false
          - target: x86_64-apple-darwin
            os: macos-14
            asset: kopiur-cli_darwin_amd64.tar.gz
            best-effort: false
          - target: aarch64-apple-darwin
            os: macos-14
            asset: kopiur-cli_darwin_arm64.tar.gz
            best-effort: false
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            asset: kopiur-cli_windows_amd64.zip
            best-effort: true
    env:
      VERSION: ${{ github.event.release.tag_name }}
      RUST_VERSION: ${{ needs.versions.outputs.rust-version }}
      TARGET: ${{ matrix.target }}
      ASSET: ${{ matrix.asset }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install musl toolchain
        if: ${{ contains(matrix.target, 'musl') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_VERSION}" --profile minimal
          rustup default "${RUST_VERSION}"
          rustup target add "${TARGET}"

      # KOPIUR_VERSION stamps `kubectl kopiur --version` with the release tag
      # (crates/cli/src/consts.rs option_env!) — the same model as the images'
      # VERSION build-arg; release-please config stays untouched.
      - name: Build kubectl-kopiur
        shell: bash
        env:
          KOPIUR_VERSION: ${{ github.event.release.tag_name }}
        run: cargo build --release --locked --target "${TARGET}" -p kopiur-cli

      - name: Package (tar.gz)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          tar -czf "${ASSET}" -C "target/${TARGET}/release" kubectl-kopiur
          shasum -a 256 "${ASSET}" > "${ASSET}.sha256" 2>/dev/null \
            || sha256sum "${ASSET}" > "${ASSET}.sha256"

      - name: Package (zip)
        if: ${{ contains(matrix.target, 'windows') }}
        shell: pwsh
        run: |
          Compress-Archive -Path "target/$env:TARGET/release/kubectl-kopiur.exe" -DestinationPath "$env:ASSET"
          (Get-FileHash -Algorithm SHA256 "$env:ASSET").Hash.ToLower() + "  $env:ASSET" | Out-File -Encoding ascii "$env:ASSET.sha256"

      - name: Upload to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${VERSION}" "${ASSET}" "${ASSET}.sha256" --clobber

  # Render the krew manifest from .krew.yaml (sha256s substituted from the
  # uploaded assets), attach it to the release, and commit it to THIS repo's
  # plugins/ directory — the kopiur repository doubles as its own krew custom
  # index (`kubectl krew index add kopiur <this repo's git URL>`). The commit
  # uses GITHUB_TOKEN, which cannot retrigger workflows (no recursion).
  krew:
    name: Krew manifest
    needs: plugin
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event.release.tag_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Checkout main (not the tag) so the manifest commit lands on the
          # branch krew clones as the index. Credentials are NOT persisted
          # (zizmor artipacked); the push below authenticates explicitly.
          ref: main
          persist-credentials: false

      - name: Render the krew manifest
        run: |
          set -eu
          mkdir -p dist && cd dist
          gh release download "${VERSION}" --pattern 'kopiur-cli_*' --repo "${GITHUB_REPOSITORY}"
          cd ..
          cp .krew.yaml kopiur.yaml
          sed -i "s|{{VERSION}}|${VERSION}|g" kopiur.yaml
          sed -i "s|{{REPO}}|${GITHUB_REPOSITORY}|g" kopiur.yaml
          for platform in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64 windows_amd64; do
            ext=tar.gz; [ "${platform}" = windows_amd64 ] && ext=zip
            file="dist/kopiur-cli_${platform}.${ext}"
            if [ -f "${file}" ]; then
              sum=$(sha256sum "${file}" | cut -d' ' -f1)
              sed -i "s|{{SHA256_${platform}}}|${sum}|g" kopiur.yaml
            else
              # Best-effort platform whose build failed: drop its block so krew
              # only offers platforms that exist. yq deletes by matching the
              # unsubstituted placeholder.
              yq -i "del(.spec.platforms[] | select(.sha256 == \"{{SHA256_${platform}}}\"))" kopiur.yaml
              echo "note: ${file} missing; dropped ${platform} from the manifest"
            fi
          done
          if grep -q '{{' kopiur.yaml; then
            echo "unsubstituted placeholders remain:"; grep -n '{{' kopiur.yaml; exit 1
          fi
          cat kopiur.yaml

      - name: Attach the manifest to the release
        run: gh release upload "${VERSION}" kopiur.yaml --clobber

      # Commit the manifest into the in-repo index. Direct push first; when
      # main requires PRs (branch protection), fall back to an auto-merge PR.
      - name: Commit to the in-repo krew index (plugins/)
        run: |
          set -eu
          cp kopiur.yaml plugins/kopiur.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/kopiur.yaml
          git diff --cached --quiet && { echo "manifest unchanged"; exit 0; }
          git commit -m "chore(krew): kopiur ${VERSION} manifest"
          # The checkout does not persist credentials; authenticate this one
          # push explicitly with the job's GITHUB_TOKEN.
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git push "${remote}" HEAD:main; then
            echo "pushed plugins/kopiur.yaml to main"
          else
            echo "direct push refused (branch protection?); opening an auto-merge PR"
            branch="krew-manifest-${VERSION}"
            git push "${remote}" "HEAD:refs/heads/${branch}"
            gh pr create --base main --head "${branch}" \
              --title "chore(krew): kopiur ${VERSION} manifest" \
              --body "Rendered krew manifest for ${VERSION} (generated by the release workflow)."
            gh pr merge "${branch}" --auto --squash || \
              echo "auto-merge unavailable; merge the PR to publish the index update"
          fi
