---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  versions:
    name: Versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      kopia-version: ${{ steps.versions.outputs.kopia-version }}
      rust-version: ${{ steps.versions.outputs.rust-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: false
          experimental: true
          install: false

      - name: Resolve versions
        id: versions
        run: |
          echo "kopia-version=$(mise config get tools.kopia)" >> "$GITHUB_OUTPUT"
          echo "rust-version=$(mise config get tools.rust.version)" >> "$GITHUB_OUTPUT"

  release:
    name: Release (${{ matrix.component }})
    needs: versions
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: controller
            dockerfile: docker/Dockerfile
            build_args: BIN=kopiur-controller
          - component: webhook
            dockerfile: docker/Dockerfile
            build_args: BIN=kopiur-webhook
          - component: mover
            dockerfile: docker/Dockerfile.mover
            build_args: ""
    uses: docker/github-builder/.github/workflows/build.yml@70ac3fc303efa83d2b94905e6ab78bb83cbdc2ae # v1.11.0
    with:
      build-args: |
        VERSION=${{ github.ref_name }}
        REVISION=${{ github.sha }}
        KOPIA_VERSION=${{ needs.versions.outputs.kopia-version }}
        RUST_VERSION=${{ needs.versions.outputs.rust-version }}
        ${{ matrix.build_args }}
      cache: true
      cache-scope: ${{ matrix.component }}
      file: ${{ matrix.dockerfile }}
      meta-images: ghcr.io/${{ github.repository }}-${{ matrix.component }}
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=raw,value=rolling,enable=${{ github.event_name == 'release' }}
        type=ref,event=branch
      output: image
      platforms: linux/amd64,linux/arm64
      push: true
      sbom: true
      sign: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  helm:
    name: Helm
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: false
          experimental: true
          install_args: --locked

      - name: Check generated manifests
        run: cargo xtask gen-all --check

      - name: Package Helm chart
        run: |
          VERSION="${VERSION#v}"
          helm package deploy/helm/kopiur \
            --version "${VERSION}" \
            --app-version "${VERSION}"

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Helm chart to GHCR
        run: |-
          VERSION="${VERSION#v}"
          helm push "kopiur-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
