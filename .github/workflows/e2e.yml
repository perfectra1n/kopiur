name: E2E

# End-to-end tests: build the three component images, load them into an
# ephemeral kind cluster, install the Helm chart, and drive real CRD lifecycles
# (Repository → Backup → Restore → Delete, schedule, maintenance) via the
# kopiur-e2e crate. Heavy (image builds + kind), so it runs on every PR as a
# focused single-arch suite, plus a nightly run and on-demand dispatch.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 07:00 UTC nightly.
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: e2e (kind + helm)
    runs-on: ubuntu-latest
    # Don't let a hung wait burn the whole budget.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026)
        with:
          toolchain: "1.95"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: e2e

      # kind, kubectl, and helm come from .mise/config.toml [tools].
      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install_args: --locked

      # The harness builds the images, creates its own kind cluster, loads the
      # images, installs the chart, runs the e2e crate, and tears down. It uses
      # an isolated kubeconfig and only ever touches the throwaway cluster.
      - name: Run e2e harness
        run: mise run test-e2e
