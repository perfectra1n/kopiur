name: E2E

# End-to-end tests: build the three component images, load them into an
# ephemeral kind cluster, install the Helm chart, and drive real CRD lifecycles
# (Repository → Backup → Restore → Delete, schedule, maintenance) via the
# kopiur-e2e crate. Heavy (image builds + kind), so it runs on every PR as a
# focused single-arch suite, plus a nightly run and on-demand dispatch.

on:
  pull_request:
  push:
    branches: [master, main]
  schedule:
    # 07:00 UTC nightly.
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: e2e (kind + helm)
    runs-on: ubuntu-latest
    # Don't let a hung wait burn the whole budget.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026)
        with:
          toolchain: "1.95"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: e2e

      - name: Install kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      # The harness builds the images, creates its own kind cluster, loads the
      # images, installs the chart, runs the e2e crate, and tears down. It uses
      # an isolated kubeconfig and only ever touches the throwaway cluster.
      - name: Run e2e harness
        run: scripts/with-e2e.sh
