---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: E2E

# End-to-end tests: build the three component images, load them into an
# ephemeral kind cluster, install the Helm chart, and drive real CRD lifecycles
# (Repository → Backup → Restore → Delete, schedule, maintenance) via the
# kopiur-e2e crate. Heavy (image builds + kind), so it runs on every PR as a
# focused single-arch suite, plus a nightly run and on-demand dispatch.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # 07:00 UTC nightly.
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-24.04
    # Don't let a hung wait burn the whole budget.
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # kind, kubectl, and helm come from .mise/config.toml [tools].
      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          experimental: true
          install_args: --locked

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: e2e

      # The harness builds the images, creates its own kind cluster, loads the
      # images, installs the chart, runs the e2e crate, and tears down. It uses
      # an isolated kubeconfig and only ever touches the throwaway cluster.
      # The e2e tasks are a mise monorepo subproject (crates/e2e/mise.toml);
      # `settings.experimental` in .mise/config.toml enables that mode.
      - name: Run e2e tests
        run: mise run //crates/e2e:test
