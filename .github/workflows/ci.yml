name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast, hermetic gate: formatting, lints, the full unit/serde/validation suite,
  # and the codegen drift guard. No cluster, no network beyond crates.io.
  lint-test:
    name: fmt · clippy · test · codegen-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026)
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Test workspace (hermetic)
        run: cargo test --workspace --locked

      - name: Codegen drift guard (CRDs + RBAC match checked-in)
        run: cargo xtask gen-all --check

  # Real-dependency tests gated behind the `integration` feature and #[ignore]:
  # a real kopia binary for the filesystem round-trip, and an ephemeral kind
  # cluster for CRD admission / reconciler / webhook tests.
  integration:
    name: integration (kopia + kind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026)
        with:
          toolchain: "1.95"

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: integration

      - name: Install kopia
        run: |
          set -euo pipefail
          KOPIA_VERSION=0.23.0
          curl -fsSL -o kopia.tar.gz \
            "https://github.com/kopia/kopia/releases/download/v${KOPIA_VERSION}/kopia-${KOPIA_VERSION}-linux-x64.tar.gz"
          tar -xzf kopia.tar.gz
          sudo install -m 0755 "kopia-${KOPIA_VERSION}-linux-x64/kopia" /usr/local/bin/kopia
          kopia --version

      - name: Create ephemeral kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: kopiur-it

      - name: Generate & apply CRDs
        # Server-side apply is required: the BackupConfig CRD embeds a full
        # JobSpec (runJob hook) and exceeds the 256KB last-applied-configuration
        # annotation that a client-side apply would create.
        run: |
          cargo xtask gen-crds
          kubectl apply --server-side -f deploy/crds/all-crds.yaml

      - name: Run integration tests (feature-gated, ignored-by-default)
        run: cargo test --workspace --features integration --locked -- --include-ignored

  # Hermetic line/region coverage over the unit/serde/validation suite. Report
  # only (uploaded as an artifact + to Codecov when configured); does NOT fail
  # the build on a threshold — visibility without blocking early churn.
  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026)
        with:
          toolchain: "1.95"
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coverage
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@3d832235cb306500b868c2632a137d48634568cd # v2.81.0
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --workspace --locked --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-lcov
          path: lcov.info
      - name: Upload to Codecov (no-op without a token on forks)
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        continue-on-error: true
        with:
          files: lcov.info
          fail_ci_if_error: false

  # Lint the Helm chart and validate the rendered manifests + generated CRDs
  # against the upstream Kubernetes JSON schemas.
  helm:
    name: helm lint · kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -fsSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform
      - name: helm lint
        run: helm lint deploy/helm/kopiur
      - name: Validate rendered manifests (namespaced + cluster scope)
        run: |
          set -euo pipefail
          for scope in namespaced cluster; do
            helm template kopiur deploy/helm/kopiur --set installScope=$scope \
              | kubeconform -strict -summary -ignore-missing-schemas
          done
      - name: Validate generated CRDs
        run: kubeconform -strict -summary -ignore-missing-schemas deploy/crds/all-crds.yaml

  # Build every component image MULTI-ARCH (linux/amd64 + linux/arm64) but do NOT
  # push. This mirrors the release `images` job exactly, so a Dockerfile break or
  # a concurrent multi-arch cache race (the cargo `.cargo-ok: File exists` failure
  # that only surfaces when both arches build in one buildx) is caught on the PR
  # instead of at release time. push=false keeps it credential-free.
  images:
    name: image build (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: controller
            dockerfile: docker/Dockerfile
            build_args: BIN=kopiur-controller
          - component: webhook
            dockerfile: docker/Dockerfile
            build_args: BIN=kopiur-webhook
          - component: mover
            dockerfile: docker/Dockerfile.mover
            build_args: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build (multi-arch, no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=img-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=img-${{ matrix.component }}

  # Supply-chain / license audit (advisory; does not block merges by default).
  audit:
    name: cargo-deny
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check
