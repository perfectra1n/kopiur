name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast, hermetic gate: formatting, lints, the full unit/serde/validation suite,
  # and the codegen drift guard. No cluster, no network beyond crates.io.
  # Tasks come from .mise/config.toml so CI and `mise run` share one definition.
  lint-test:
    name: fmt · clippy · test · codegen-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026)
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install_args: --locked

      - name: rustfmt
        run: mise run fmt-check

      - name: clippy (deny warnings)
        run: mise run clippy

      - name: Build workspace
        run: mise run build

      - name: Test workspace (hermetic)
        run: mise run test

      - name: Codegen drift guard (CRDs + RBAC match checked-in)
        run: mise run gen-check

  # Real-dependency tests gated behind the `integration` feature and #[ignore]:
  # a real kopia binary for the filesystem round-trip, and an ephemeral kind
  # cluster for CRD admission / reconciler / webhook tests. The cluster is
  # orchestrated by the workflow (kind-action), not the local with-kind.sh
  # wrapper, so this job keeps its own steps rather than calling a mise task.
  integration:
    name: integration (kopia + kind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026)
        with:
          toolchain: "1.95"

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: integration

      - name: Install kopia
        run: |
          set -euo pipefail
          KOPIA_VERSION=0.23.0
          curl -fsSL -o kopia.tar.gz \
            "https://github.com/kopia/kopia/releases/download/v${KOPIA_VERSION}/kopia-${KOPIA_VERSION}-linux-x64.tar.gz"
          tar -xzf kopia.tar.gz
          sudo install -m 0755 "kopia-${KOPIA_VERSION}-linux-x64/kopia" /usr/local/bin/kopia
          kopia --version

      - name: Create ephemeral kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: kopiur-it

      - name: Generate & apply CRDs
        # Server-side apply is required: the BackupConfig CRD embeds a full
        # JobSpec (runJob hook) and exceeds the 256KB last-applied-configuration
        # annotation that a client-side apply would create.
        run: |
          cargo xtask gen-crds
          kubectl apply --server-side -f deploy/crds/all-crds.yaml

      - name: Run integration tests (feature-gated, ignored-by-default)
        run: cargo test --workspace --features integration --locked -- --include-ignored

  # Hermetic line/region coverage over the unit/serde/validation suite. Report
  # only (uploaded as an artifact + to Codecov when configured); does NOT fail
  # the build on a threshold — visibility without blocking early churn.
  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026)
        with:
          toolchain: "1.95"
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coverage
      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install_args: --locked
      - name: Generate coverage (lcov)
        run: mise run cov
      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-lcov
          path: lcov.info
      - name: Upload to Codecov (no-op without a token on forks)
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        continue-on-error: true
        with:
          files: lcov.info
          fail_ci_if_error: false

  # Lint the Helm chart and validate the rendered manifests + generated CRDs
  # against the upstream Kubernetes JSON schemas (helm + kubeconform from mise).
  helm:
    name: helm lint · kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install_args: --locked
      - name: helm lint · kubeconform (both scopes + CRDs)
        run: mise run helm-lint

  # Build every component image MULTI-ARCH (linux/amd64 + linux/arm64) but do NOT
  # push. This mirrors the release `images` job exactly, so a Dockerfile break or
  # a concurrent multi-arch cache race (the cargo `.cargo-ok: File exists` failure
  # that only surfaces when both arches build in one buildx) is caught on the PR
  # instead of at release time. push=false keeps it credential-free.
  images:
    name: image build (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: controller
            dockerfile: docker/Dockerfile
            build_args: BIN=kopiur-controller
          - component: webhook
            dockerfile: docker/Dockerfile
            build_args: BIN=kopiur-webhook
          - component: mover
            dockerfile: docker/Dockerfile.mover
            build_args: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build (multi-arch, no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=img-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=img-${{ matrix.component }}

  # Supply-chain / license audit (advisory; does not block merges by default).
  # cargo-deny comes from mise; `cargo deny check` shells out to cargo metadata,
  # so the Rust toolchain is still required.
  audit:
    name: cargo-deny
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026)
        with:
          toolchain: "1.95"
      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install_args: --locked
      - name: cargo deny check
        run: mise run audit
