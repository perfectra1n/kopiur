name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write   # create GitHub releases
  packages: write   # push images to GHCR

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  # Derived from the repo's owner (home-operations). The three component images
  # publish as ghcr.io/<owner>/<repo>-<component> (e.g. .../kopiur-controller),
  # the dash-flat scheme this org uses and the chart's image defaults expect.
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # Build static-ish release binaries for linux amd64 + arm64 and upload them
  # as release assets.
  binaries:
    name: binaries (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026)
        with:
          toolchain: "1.95"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}
      - name: Build release binaries
        run: |
          cargo build --release --locked --target ${{ matrix.target }} \
            -p kopiur-controller -p kopiur-webhook -p kopiur-mover
      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          for bin in kopiur-controller kopiur-webhook kopiur-mover; do
            cp "target/${{ matrix.target }}/release/${bin}" "dist/${bin}-${{ matrix.target }}"
          done
          ( cd dist && sha256sum kopiur-* > "SHA256SUMS-${{ matrix.target }}.txt" )
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binaries-${{ matrix.target }}
          path: dist/*

  # Build and push multi-arch container images for each component to GHCR.
  images:
    name: image (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: controller
            dockerfile: docker/Dockerfile
            build_args: BIN=kopiur-controller
          - component: webhook
            dockerfile: docker/Dockerfile
            build_args: BIN=kopiur-webhook
          - component: mover
            dockerfile: docker/Dockerfile.mover
            build_args: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build & push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Package the Helm chart, bundle the CRDs, and publish the GitHub Release.
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [binaries, images]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026)
        with:
          toolchain: "1.95"
      - name: Regenerate CRDs & RBAC (and verify no drift)
        run: |
          cargo xtask gen-all --check

      - name: Download binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: binaries-*
          path: dist
          merge-multiple: true

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Package Helm chart
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.tag }}"; VERSION="${VERSION#v}"
          helm package deploy/helm/kopiur --version "${VERSION}" --app-version "${VERSION}" -d dist
          # Push the chart as an OCI artifact to the org's shared chart namespace
          # (ghcr.io/<owner>/charts/kopiur), the convention used across the org.
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push "dist/kopiur-${VERSION}.tgz" "oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts" || \
            echo "::warning::helm push to OCI failed (non-fatal); chart is still attached to the release"

      - name: Bundle CRDs
        run: cp deploy/crds/all-crds.yaml dist/kopiur-crds-${{ steps.ver.outputs.tag }}.yaml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/kopiur-*
            dist/SHA256SUMS-*.txt
