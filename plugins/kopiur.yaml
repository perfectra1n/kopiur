# Krew plugin manifest TEMPLATE for kubectl-kopiur. The release workflow's
# `krew` job substitutes the double-braced VERSION/KREW_VERSION/REPO/SHA256
# placeholders
# from the uploaded release assets, attaches the rendered `kopiur.yaml` to the
# GitHub release, and commits it to THIS repo's plugins/ directory — the
# kopiur repository doubles as its own krew custom index. Platforms whose
# asset is missing (best-effort Windows) are dropped at render time; the
# render fails if any placeholder survives, so this comment must never
# contain one.
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kopiur
spec:
  version: "v0.4.0"
  homepage: https://kopiur.home-operations.com/cli/
  shortDescription: Operate the kopiur backup operator
  description: |
    kubectl kopiur wraps day-to-day operations of the kopiur Kopia-native
    backup operator: trigger snapshots and restores, suspend/resume resources,
    inspect snapshots, run maintenance, browse files INSIDE snapshots through
    a read-only in-cluster session, diagnose installs with `doctor`, and
    translate VolSync restic configs with `migrate volsync`.
  caveats: |
    The plugin tracks the kopiur v1alpha1 CRDs — keep it on the same release
    as the operator. Browsing needs the chart's opt-in browse ClusterRole
    (rbac.browseRole) or equivalent RBAC.
  platforms:
    - selector:
        matchLabels: {os: linux, arch: amd64}
      uri: https://github.com/home-operations/kopiur/releases/download/0.4.0/kopiur-cli_linux_amd64.tar.gz
      sha256: "def44f137e652f48c85037276dad5f02b7f62d5638dad17e6c17bb61f4bddf94"
      bin: kubectl-kopiur
    - selector:
        matchLabels: {os: linux, arch: arm64}
      uri: https://github.com/home-operations/kopiur/releases/download/0.4.0/kopiur-cli_linux_arm64.tar.gz
      sha256: "1dd373ce0bcc4a3275c659fdfbaca804e168dd83e1740488d98bba0780a4fa30"
      bin: kubectl-kopiur
    - selector:
        matchLabels: {os: darwin, arch: amd64}
      uri: https://github.com/home-operations/kopiur/releases/download/0.4.0/kopiur-cli_darwin_amd64.tar.gz
      sha256: "a4375b74228c105741760d01cf0e6a6f0d5a831fb3b7065397615fe852c13d65"
      bin: kubectl-kopiur
    - selector:
        matchLabels: {os: darwin, arch: arm64}
      uri: https://github.com/home-operations/kopiur/releases/download/0.4.0/kopiur-cli_darwin_arm64.tar.gz
      sha256: "da2a2d78e2baae2b4bdf5b235a049fd151998cc79dc07a91e6e85c83aa6d0bf4"
      bin: kubectl-kopiur
