[[remotes]]
git_url = "https://github.com/home-operations/.github"
ref = "main"
configs = ["lefthook.common.toml"]

# Regenerate the chart's committed README + values.schema.json whenever their inputs
# change, and stage them. CI's helm-docs-check is the backstop.
[pre-commit.commands.helm-docs]
glob = [
  "deploy/helm/kopiur/Chart.yaml",
  "deploy/helm/kopiur/values.yaml",
  "deploy/helm/kopiur/README.md.gotmpl",
]
run = "mise run helm-docs && git add deploy/helm/kopiur/README.md deploy/helm/kopiur/values.schema.json"

# The generated chart README and the authored MkDocs site under docs/ are both
# .prettierignore'd; exclude them from the shared formatter too. Without this,
# staging only docs/*.md hands oxfmt an all-ignored set and it exits non-zero
# ("Expected at least one target file"), failing the whole hook.
[pre-commit.commands.format-markdown]
exclude = ["deploy/helm/kopiur/README.md", "docs/**"]

[pre-commit.commands.format-json]
exclude = ["deploy/helm/kopiur/values.schema.json"]

# Helm chart templates are Go-templated YAML — a `{{- if -}}` guard on line 1 is
# not valid standalone YAML, so oxfmt's parser errors out (exit 2). They can
# never be fed to a YAML formatter; skip the whole templates/ dir.
[pre-commit.commands.format-yaml]
exclude = [
  "deploy/crds/*.yaml",
  "deploy/helm/kopiur/files/crds/*.yaml",
  "deploy/helm/kopiur/templates/*.yaml",
]
