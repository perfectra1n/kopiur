[[remotes]]
git_url = "https://github.com/home-operations/.github"
ref = "main"
configs = ["lefthook.common.toml"]

# Regenerate the chart's committed README + values.schema.json whenever their inputs
# change, and stage them. CI's helm-docs-check is the backstop.
[pre-commit.commands.helm-docs]
glob = [
  "deploy/helm/kopiur/Chart.yaml",
  "deploy/helm/kopiur/values.yaml",
  "deploy/helm/kopiur/README.md.gotmpl",
]
run = "mise run helm-docs && git add deploy/helm/kopiur/README.md deploy/helm/kopiur/values.schema.json"

# The generated chart README/schema are .prettierignore'd; exclude them from the
# shared formatters too (oxfmt exits non-zero when every input is ignored).
[pre-commit.commands.format-markdown]
exclude = ["deploy/helm/kopiur/README.md"]

[pre-commit.commands.format-json]
exclude = ["deploy/helm/kopiur/values.schema.json"]
