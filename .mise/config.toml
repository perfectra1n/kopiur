# mise tasks + tooling for kopiur. `mise tasks` lists them; `mise run <task>`.
# Mise is the source of truth for Rust and project tools in developer shells and CI.

[tools]
rust = { version = "1.95.0", components = "rustfmt,clippy,llvm-tools-preview" }
lefthook = "2.1.9"
oxfmt = "0.53.0"
zizmor = "1.25.2"
helm = "4.2.0"
kubectl = "1.36.1"
kind = "0.32.0"
kopia = "0.23.0"
kubeconform = "0.8.0"
"aqua:EmbarkStudios/cargo-deny" = "0.19.8"
"aqua:taiki-e/cargo-llvm-cov" = "0.8.7"
# Docs site toolchain (mdBook + preprocessors + link checker). See `mise run docs`.
# mermaid/admonish ship .tar.gz, so the (non-deprecated) github backend extracts
# them with the exec bit intact. mdbook-linkcheck only ships a .zip, which the
# github backend extracts as non-executable (0644) and ubi is deprecated, so we
# build it from source via the cargo backend (always executable; cached by
# mise-action in CI).
#
# VERSION LOCK — do not bump mdBook to 0.5.x yet. mdbook-admonish 1.20.0 (its
# latest release) is built against mdBook 0.4's preprocessor protocol and cannot
# parse mdBook 0.5's `Book` JSON (it aborts with `missing field \`sections\``).
# mdbook-mermaid 0.17.0 is the inverse — it requires mdBook 0.5 and fails on 0.4.
# So admonish (0.4-only) and mermaid 0.17 (0.5-only) cannot share one mdBook.
# Verified matrix: mdBook 0.4.52 works with admonish 1.20.0 + mermaid 0.16.2.
# Revisit the 0.5 bump once mdbook-admonish ships an mdBook-0.5 release.
"aqua:rust-lang/mdBook" = "0.4.52"
"github:badboy/mdbook-mermaid" = "0.16.2"
"github:tommilligan/mdbook-admonish" = "1.20.0"
"cargo:mdbook-linkcheck" = "0.7.7"

[tasks.build]
description = "Compile the whole workspace (debug, locked deps)"
run = "cargo build --workspace --locked"

[tasks.build-release]
description = "Compile the release binaries we ship (controller, webhook, mover)"
run = "cargo build --release --locked -p kopiur-controller -p kopiur-webhook -p kopiur-mover"

[tasks.rust-components]
description = "Install Rust components required by project tasks"
run = "rustup component add rustfmt clippy llvm-tools-preview"

[tasks.test]
description = "Hermetic test suite: unit + serde + validation (no cluster, no network)"
run = "cargo test --workspace --locked"

[tasks.test-int]
description = "Cluster + kopia integration tests on an ephemeral kind cluster"
run = "scripts/with-kind.sh cargo test --workspace --features integration --locked -- --include-ignored"

# --- e2e harness -------------------------------------------------------------
# The host-level steps (no Kubernetes API exists for them) are discrete mise
# tasks; the in-cluster provisioning (namespaces, secrets, PV/PVCs, MinIO,
# buckets, waits) lives in Rust (crates/e2e `World`, driven from the tests).
#
# Every e2e task pins an ISOLATED KUBECONFIG under target/ so it can only ever
# touch the throwaway `kopiur-e2e` cluster — never the user's real context. This
# is scoped per-task (mise has no global [env] that would leak to other tasks).
# `test-e2e` exports the same path, so the sub-tasks it invokes inherit it.

[tasks.e2e-images]
description = "Build the controller/webhook/mover images tagged :e2e for the harness"
run = """
set -eu
export KOPIUR_IMAGE_PREFIX=kopiur KOPIUR_IMAGE_TAG=e2e
mise run image-controller
mise run image-webhook
mise run image-mover
"""

[tasks.e2e-cluster-up]
description = "Create (or reuse) the kopiur-e2e kind cluster and load images"
env = { KUBECONFIG = "{{config_root}}/target/e2e/kubeconfig" }
run = """
set -eu
CLUSTER=kopiur-e2e
NODE=$CLUSTER-control-plane
TAG=e2e
mkdir -p "$(dirname "$KUBECONFIG")"
if kind get clusters 2>/dev/null | grep -qx "$CLUSTER"; then
  echo "==> reusing kind cluster '$CLUSTER'"
else
  echo "==> creating kind cluster '$CLUSTER'"
  kind create cluster --name "$CLUSTER" --kubeconfig "$KUBECONFIG"
fi
kind export kubeconfig --name "$CLUSTER" --kubeconfig "$KUBECONFIG"

echo "==> loading component images into kind"
kind load docker-image "kopiur/controller:$TAG" "kopiur/webhook:$TAG" "kopiur/mover:$TAG" --name "$CLUSTER"

# Preload MinIO + mc into the node so the in-cluster pull can't time out the
# rollout (kind load chokes on docker's manifest-list store, so import the saved
# tarball into the node's containerd k8s.io namespace). Best-effort.
preload() {
  img="$1"
  for attempt in 1 2 3; do docker pull "$img" >/dev/null 2>&1 && break; echo "   (retry $attempt) $img"; sleep 3; done
  docker save "$img" | docker exec -i "$NODE" ctr --namespace=k8s.io images import - >/dev/null 2>&1 \\
    && echo "   preloaded $img" || echo "   warn: could not preload $img (will pull in-cluster)"
}
preload minio/minio:latest
preload minio/mc:latest
"""

[tasks.e2e-node-seed]
description = "Seed the kopiur-e2e node's hostPath fixtures (repo/src + non-writable ro-repo)"
run = '''
set -eu
NODE=kopiur-e2e-control-plane
echo "==> seeding hostPath fixtures on $NODE"
docker exec "$NODE" sh -c '
  set -e
  mkdir -p /kopiur-e2e/repo /kopiur-e2e/src/sub
  printf "hello kopiur e2e\n" > /kopiur-e2e/src/a.txt
  printf "nested data\n"      > /kopiur-e2e/src/sub/b.txt
  chmod -R 0777 /kopiur-e2e
  # A deliberately NON-writable repo dir (root-owned, no write bit) for the
  # terminal-failure regression test; set AFTER the 0777 above so it sticks.
  mkdir -p /kopiur-e2e/ro-repo
  chown 0:0 /kopiur-e2e/ro-repo
  chmod 0555 /kopiur-e2e/ro-repo
'
'''

[tasks.e2e-helm]
description = "Install the operator chart into the kopiur-e2e cluster (deploy/e2e/values.yaml)"
env = { KUBECONFIG = "{{config_root}}/target/e2e/kubeconfig" }
run = """
set -eu
echo "==> helm install"
helm upgrade --install kopiur deploy/helm/kopiur \\
  --namespace kopiur-e2e --create-namespace \\
  --wait --timeout 5m \\
  -f deploy/e2e/values.yaml
"""

[tasks.e2e-down]
description = "Delete the ephemeral kopiur-e2e kind cluster"
env = { KUBECONFIG = "{{config_root}}/target/e2e/kubeconfig" }
run = """
set -u
echo "==> deleting kind cluster 'kopiur-e2e' (kubeconfig: $KUBECONFIG)"
kind delete cluster --name kopiur-e2e >/dev/null 2>&1 || true
rm -f "$KUBECONFIG" || true
"""

[tasks.e2e-diagnostics]
description = "Dump kopiur-e2e cluster state (CRs/Jobs/pods/events/logs) for debugging"
env = { KUBECONFIG = "{{config_root}}/target/e2e/kubeconfig" }
run = '''
set +e
NS=kopiur-e2e
echo "================ E2E DIAGNOSTICS ================" >&2
kubectl get repositories,clusterrepositories,backupconfigs,backups,backupschedules,restores,maintenances -A -o wide >&2 2>&1
kubectl get jobs,pods,serviceaccounts,rolebindings -A -o wide >&2 2>&1
echo "---- Warning Events ----" >&2
kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp >&2 2>&1
echo "---- controller logs ----" >&2
kubectl logs -n "$NS" -l app.kubernetes.io/component=controller --tail=400 --all-containers >&2 2>&1
echo "---- Job pod logs (all namespaces) ----" >&2
kubectl get pods -A -l batch.kubernetes.io/job-name -o 'jsonpath={range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' 2>/dev/null \
  | while read -r mns mpod; do [ -n "$mpod" ] || continue; echo "-- $mns/$mpod --" >&2; kubectl logs -n "$mns" "$mpod" --tail=200 --all-containers >&2 2>&1; done
echo "---- Job descriptions ----" >&2
kubectl describe jobs -A >&2 2>&1
echo "================ END DIAGNOSTICS ================" >&2
true
'''

[tasks.test-e2e]
description = "Full end-to-end: build+load images, kind up, helm install, run Rust e2e, tear down"
env = { KUBECONFIG = "{{config_root}}/target/e2e/kubeconfig" }
run = '''
set -eu
for bin in docker kind kubectl helm; do
  command -v "$bin" >/dev/null 2>&1 || { echo "error: '$bin' is required" >&2; exit 127; }
done

cleanup() {
  rc=$?
  # Dump state before teardown so a CI failure is debuggable (the cluster is gone after).
  [ "$rc" -ne 0 ] && mise run e2e-diagnostics || true
  if [ "${KOPIUR_KEEP_KIND:-0}" != "1" ]; then
    mise run e2e-down || true
  else
    echo "==> KOPIUR_KEEP_KIND=1; leaving cluster (kubeconfig: $KUBECONFIG)"
  fi
  exit $rc
}
trap cleanup EXIT

if [ "${KOPIUR_E2E_SKIP_BUILD:-0}" != "1" ]; then mise run e2e-images; fi
mise run e2e-cluster-up
mise run e2e-node-seed
mise run e2e-helm

echo "==> running e2e tests"
cargo test -p kopiur-e2e --features e2e -- --include-ignored --test-threads=1 --nocapture ${KOPIUR_E2E_TESTFILTER:-}
echo "==> e2e tests passed"
'''

[tasks.clippy]
description = "Clippy across the workspace, warnings are errors"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks.fmt]
description = "Format the workspace in place"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Verify formatting without changing files (CI gate)"
run = "cargo fmt --all -- --check"

[tasks.gen]
description = "Regenerate deploy/crds + deploy/rbac from the Rust types"
run = "cargo xtask gen-all"

[tasks.gen-check]
description = "Fail if checked-in CRDs/RBAC are stale (CI drift guard)"
run = "cargo xtask gen-all --check"

[tasks.cov]
description = "Coverage over the hermetic suite -> lcov.info (report-only; no threshold)"
run = "cargo llvm-cov --workspace --locked --lcov --output-path lcov.info"

[tasks.cov-html]
description = "Coverage as a browsable HTML report under target/llvm-cov/html"
run = "cargo llvm-cov --workspace --locked --html"

[tasks.cov-summary]
description = "Coverage summary printed to the terminal"
run = "cargo llvm-cov --workspace --locked --summary-only"

[tasks.image-controller]
description = "Build the controller image locally"
run = '''
KOPIA_VERSION="${KOPIA_VERSION:-$(mise config get tools.kopia)}"
RUST_VERSION="${RUST_VERSION:-$(mise config get tools.rust.version)}"
docker build -f docker/Dockerfile \
  --build-arg BIN=kopiur-controller \
  --build-arg "KOPIA_VERSION=${KOPIA_VERSION}" \
  --build-arg "RUST_VERSION=${RUST_VERSION}" \
  -t "${KOPIUR_IMAGE_PREFIX:-ghcr.io/home-operations/kopiur}/controller:${KOPIUR_IMAGE_TAG:-dev}" .
'''

[tasks.image-webhook]
description = "Build the webhook image locally"
run = '''
KOPIA_VERSION="${KOPIA_VERSION:-$(mise config get tools.kopia)}"
RUST_VERSION="${RUST_VERSION:-$(mise config get tools.rust.version)}"
docker build -f docker/Dockerfile \
  --build-arg BIN=kopiur-webhook \
  --build-arg "KOPIA_VERSION=${KOPIA_VERSION}" \
  --build-arg "RUST_VERSION=${RUST_VERSION}" \
  -t "${KOPIUR_IMAGE_PREFIX:-ghcr.io/home-operations/kopiur}/webhook:${KOPIUR_IMAGE_TAG:-dev}" .
'''

[tasks.image-mover]
description = "Build the mover image locally (ships the kopia binary too)"
run = '''
KOPIA_VERSION="${KOPIA_VERSION:-$(mise config get tools.kopia)}"
RUST_VERSION="${RUST_VERSION:-$(mise config get tools.rust.version)}"
docker build -f docker/Dockerfile.mover \
  --build-arg "KOPIA_VERSION=${KOPIA_VERSION}" \
  --build-arg "RUST_VERSION=${RUST_VERSION}" \
  -t "${KOPIUR_IMAGE_PREFIX:-ghcr.io/home-operations/kopiur}/mover:${KOPIUR_IMAGE_TAG:-dev}" .
'''

[tasks.images]
description = "Build all three component images locally"
depends = ["image-controller", "image-webhook", "image-mover"]

[tasks.helm-lint]
description = "Lint the chart and validate rendered manifests (both scopes) + CRDs against the k8s schema"
run = """
helm lint deploy/helm/kopiur
for scope in namespaced cluster; do
  helm template kopiur deploy/helm/kopiur --set installScope="$scope" | kubeconform -strict -summary -ignore-missing-schemas
done
kubeconform -strict -summary -ignore-missing-schemas deploy/crds/all-crds.yaml
"""

[tasks.kind-up]
description = "Create (or reuse) the ephemeral kind cluster and leave it running"
run = "KOPIUR_KEEP_KIND=1 scripts/with-kind.sh kubectl cluster-info"

[tasks.kind-down]
description = "Delete the ephemeral kind cluster"
run = 'kind delete cluster --name "${KOPIUR_KIND_CLUSTER:-kopiur-it}"'

[tasks.audit]
description = "Supply-chain + license audit"
run = "cargo deny check"

[tasks.docs]
description = "Build the full docs site (mdBook user docs + workspace rustdoc) into book/html"
run = "scripts/build-docs.sh"

[tasks.docs-serve]
description = "Serve the mdBook user docs locally with live reload (HTML renderer only; no rustdoc)"
run = "mdbook serve --open"

[tasks.ci]
description = "The full local hermetic gate: format, lint, build, test, and drift check"
depends = ["fmt-check", "clippy", "build", "test", "gen-check"]

[hooks]
postinstall = "lefthook install"
