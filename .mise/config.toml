# mise tasks + tooling for kopiur. `mise tasks` lists them; `mise run <task>`.
# Mise is the source of truth for Rust and project tools in developer shells and CI.

# Monorepo task mode: the e2e harness tasks are co-located with the crate they
# drive, in `crates/e2e/mise.toml`, and invoked as `mise run //crates/e2e:test`
# (or any sub-task, e.g. `//crates/e2e:cluster-create`). `settings.experimental`
# enables this persistently — no MISE_EXPERIMENTAL env var needed in CI or dev
# shells. Existing root tasks below stay invokable unprefixed (`mise run test`).
experimental_monorepo_root = true

[settings]
experimental = true

[monorepo]
config_roots = ["crates/e2e"]

[tools]
rust = { version = "1.95.0", components = "rustfmt,clippy,llvm-tools-preview" }
lefthook = "2.1.9"
oxfmt = "0.54.0"
zizmor = "1.25.2"
helm = "4.2.0"
cosign = "3.1.1"
kubectl = "1.36.2"
# The shared pre-commit hooks (home-operations/.github lefthook config) run
# `shellcheck` on staged *.sh files; pin it so the hook resolves a binary.
shellcheck = "0.11.0"
kind = "0.32.0"
kopia = "0.23.0"
"aqua:EmbarkStudios/cargo-deny" = "0.19.8"
"aqua:taiki-e/cargo-llvm-cov" = "0.8.7"
# Docs site toolchain. The docs are an MkDocs Material site (see `mise run docs`);
# the MkDocs + Material + pymdown-extensions versions are pinned in pyproject.toml
# / uv.lock and run via uv, so the only mise-managed tool here is uv itself (which
# creates the locked venv on first `uv run`). Material bundles mermaid.js and the
# admonition styling, so there are no separate preprocessor binaries or committed
# assets to manage. `uv lock` after bumping a docs dependency in pyproject.toml.
"aqua:astral-sh/uv" = "0.9.9"
helm-docs = "1.14.2"
"aqua:dadav/helm-schema" = "0.23.4"
yq = "4.53.3"

[tasks.build]
description = "Compile the whole workspace (debug, locked deps)"
run = "cargo build --workspace --locked"

[tasks.build-release]
description = "Compile the release binaries we ship (controller, webhook, mover)"
run = "cargo build --release --locked -p kopiur-controller -p kopiur-webhook -p kopiur-mover"

[tasks.rust-components]
description = "Install Rust components required by project tasks"
run = "rustup component add rustfmt clippy llvm-tools-preview"

[tasks.test]
description = "Hermetic test suite: unit + serde + validation (no cluster, no network)"
run = "cargo test --workspace --locked"

[tasks.test-int]
description = "Cluster + kopia integration tests on an ephemeral kind cluster"
run = "scripts/with-kind.sh cargo test --workspace --features integration --locked -- --include-ignored"

[tasks.clippy]
description = "Clippy across the workspace, warnings are errors"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks.fmt]
description = "Format the workspace in place"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Verify formatting without changing files (CI gate)"
run = "cargo fmt --all -- --check"

[tasks.gen]
description = "Regenerate deploy/crds + deploy/rbac from the Rust types"
run = "cargo xtask gen-all"

[tasks.gen-check]
description = "Fail if checked-in CRDs/RBAC are stale (CI drift guard)"
run = "cargo xtask gen-all --check"

[tasks.cov]
description = "Coverage over the hermetic suite -> lcov.info (report-only; no threshold)"
run = "cargo llvm-cov --workspace --locked --lcov --output-path lcov.info"

[tasks.cov-html]
description = "Coverage as a browsable HTML report under target/llvm-cov/html"
run = "cargo llvm-cov --workspace --locked --html"

[tasks.cov-summary]
description = "Coverage summary printed to the terminal"
run = "cargo llvm-cov --workspace --locked --summary-only"

[tasks.image-controller]
description = "Build the controller image locally"
run = '''
KOPIA_VERSION="${KOPIA_VERSION:-$(mise config get tools.kopia)}"
RUST_VERSION="${RUST_VERSION:-$(mise config get tools.rust.version)}"
docker build -f docker/Dockerfile \
  --build-arg BIN=kopiur-controller \
  --build-arg "KOPIA_VERSION=${KOPIA_VERSION}" \
  --build-arg "RUST_VERSION=${RUST_VERSION}" \
  -t "${KOPIUR_IMAGE_PREFIX:-ghcr.io/home-operations/kopiur}/controller:${KOPIUR_IMAGE_TAG:-dev}" .
'''

[tasks.image-webhook]
description = "Build the webhook image locally"
run = '''
KOPIA_VERSION="${KOPIA_VERSION:-$(mise config get tools.kopia)}"
RUST_VERSION="${RUST_VERSION:-$(mise config get tools.rust.version)}"
docker build -f docker/Dockerfile \
  --build-arg BIN=kopiur-webhook \
  --build-arg "KOPIA_VERSION=${KOPIA_VERSION}" \
  --build-arg "RUST_VERSION=${RUST_VERSION}" \
  -t "${KOPIUR_IMAGE_PREFIX:-ghcr.io/home-operations/kopiur}/webhook:${KOPIUR_IMAGE_TAG:-dev}" .
'''

[tasks.image-mover]
description = "Build the mover image locally (ships the kopia + rclone binaries too)"
run = '''
KOPIA_VERSION="${KOPIA_VERSION:-$(mise config get tools.kopia)}"
RUST_VERSION="${RUST_VERSION:-$(mise config get tools.rust.version)}"
# rclone is needed only by the rclone backend; pinned (default lives in the
# Dockerfile, overridable here for reproducible builds).
RCLONE_VERSION="${RCLONE_VERSION:-1.68.2}"
docker build -f docker/Dockerfile.mover \
  --build-arg "KOPIA_VERSION=${KOPIA_VERSION}" \
  --build-arg "RUST_VERSION=${RUST_VERSION}" \
  --build-arg "RCLONE_VERSION=${RCLONE_VERSION}" \
  -t "${KOPIUR_IMAGE_PREFIX:-ghcr.io/home-operations/kopiur}/mover:${KOPIUR_IMAGE_TAG:-dev}" .
'''

[tasks.images]
description = "Build all three component images locally"
depends = ["image-controller", "image-webhook", "image-mover"]

[tasks.helm-lint]
description = "Lint the chart and check it renders in both install scopes"
run = """
helm lint deploy/helm/kopiur
for scope in namespaced cluster; do
  helm template kopiur deploy/helm/kopiur --set installScope="$scope" >/dev/null
done
"""

[tasks.helm-test]
description = "Run helm unit tests"
run = "helm unittest deploy/helm/kopiur"

[tasks.helm-docs]
description = "Generate the chart README + values.schema.json from Chart.yaml + values.yaml"
run = """
helm-docs --chart-search-root=deploy/helm --log-level=warn
# required/additionalProperties are skipped so the schema stays permissive: values.yaml
# supplies every default and the free-form maps stay open. --append-newline gives a
# clean EOF; the file is .prettierignore'd (a generated artifact), so oxfmt skips it.
helm-schema --chart-search-root deploy/helm/kopiur --skip-auto-generation required,additionalProperties --append-newline
"""

[tasks.helm-docs-check]
description = "Fail if the generated chart README/schema are stale (CI gate)"
run = """
mise run helm-docs
git diff --exit-code deploy/helm/kopiur/README.md deploy/helm/kopiur/values.schema.json
"""

[tasks.kind-up]
description = "Create (or reuse) the ephemeral kind cluster and leave it running"
run = "KOPIUR_KEEP_KIND=1 scripts/with-kind.sh kubectl cluster-info"

[tasks.kind-down]
description = "Delete the ephemeral kind cluster"
run = 'kind delete cluster --name "${KOPIUR_KIND_CLUSTER:-kopiur-it}"'

[tasks.audit]
description = "Supply-chain + license audit"
run = "cargo deny check"

[tasks.docs]
description = "Build the full docs site (MkDocs user docs + workspace rustdoc) into site/"
run = "scripts/build-docs.sh"

[tasks.docs-serve]
description = "Serve the MkDocs user docs locally with live reload (no rustdoc nesting)"
run = "uv run mkdocs serve"

[tasks.ci]
description = "The full local hermetic gate: format, lint, build, test, and drift check"
depends = ["fmt-check", "clippy", "build", "test", "gen-check"]

[hooks]
postinstall = "lefthook install"
